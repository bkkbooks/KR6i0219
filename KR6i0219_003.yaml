body:
  text: 姚秦三藏法師鳩摩羅什奉詔譯明會稽顯聖寺後學沙門圓澄註右春坊右庶子南充黃輝左春坊左諭德會稽陶望齡同校左春坊左中𠃔太原傅新德訂正菩薩無二品第十二註前文一往問答之辭以方便實相合而不雜分而不離二而不二不二而二指趣淵深綿微難見梵天雖悟說是無說之義未解無說是說之旨此品特標無二者會前諸法皆歸無二矣爾時思益梵天白佛言世界是文殊師利法王子在此大會而無所說註梵語文殊師利此云妙吉祥如來會上為擇法眼既為擇法之眼不容無說蓋文殊于方等會上以三十二大士各說不二法門以其親從此中來不容無問而說待問而後發明也佛即告文殊師利汝於此所說法中可少說之註佛令文殊少說者發明前所說法即是無說之說於中無有少法可說也佛不自說令文殊說者使對眾辨明也文殊師利白佛言世尊佛所得法寧可識不佛言不可識也世尊是法可說可演可論不佛言不可說不可演不可論世尊若是法不可說不可演不可論者則不可示也註先標定世尊聖覺智自證之法然後辨其無說無示無演無論使人妙契言外之旨以自證之法不可得故所以智不能知識不能識言語道斷心行處絕淨名以是杜口於毗耶世尊以是掩室於摩竭若能悟旨則塵說剎說未嘗間歇豈特文殊不說而世尊曷嘗說乎爾時思益梵天謂文殊師利汝不為眾生演說法乎文殊師利言梵天法性中有二相耶梵天言無也文殊師利言一切法不入法性耶梵天言然文殊師利言若法性是不二相一切法入法性中云何當為眾生說法註若云是法無說無示者則文殊師利能不與眾生說法耶非謂不與說法但說法無二相也若有一法可言於法性中有說有聽有說有聽則著我人著我人者是名戲論非得法性若一切法皆入法性法性無二無二故無說即說何當更為眾生說乎梵天言頗有說法亦無二相耶文殊師利言若決定得說者聽者可有說法亦無有二註以法性無二故無說與說亦無有二不必更說也既無說與說不二頗有說與無說不二不若決定得說者聽者可言有二有不二若說者聽者決定不可得故指何法為二為不二也文殊師利如來不說法耶文殊師利言佛雖說法不以二相何以故如來性無二故雖有所說而無二也註不以二相者無有能說所說之相也無有能說所說則說與不說皆入法性故楞伽有二種通謂宗通相說通相宗通相者謂聖默然說通相者謂聖說法是二者說與不說會歸法性也梵天言若一切法無二其誰為二文殊師利言凡夫貪著我故分別二耳不二者終不為二雖種種分別為二然其實際無有二相註一切法聖人證實相故無二凡夫著我我所虗妄分別故二耳以實相不二者不因凡夫分別而成二也故凡夫是稱虗妄彼實際豈因而二之也梵天言云何識無二法文殊師利言若無二可識則非無二所以者何無二相者不可識也註若有無二可識則非真無二也何也以有對待故若無有對待安能識無二哉梵天二即是識業不可識法佛所說也註佛說二者是業相可識法性則不可識也是法不爾如所說何以故是法無文字故註是法不爾者不如業相之可識如來所說不依文字語言故不可識也文殊師利佛所說法終何所至文殊師利言如來說法至無所至梵天言佛所說法不至涅槃耶文殊師利言涅槃可得至耶梵天言涅槃無來處無至處文殊師利言如是佛所說法至無所至註佛所說法終至涅槃以涅槃無有處所無處所故則來無所從去無所至無所至者是佛所說至無至者至寂滅自性也以自性寂滅故無說無演無示無識寧有處所可得至也梵天言是法誰聽答言如所說梵天言云何如所說答言如不識不聞註是法既非言說可及未審誰肯聽邪聽者如所說不可識則解不可聞若解不可聞者肯聽是法也梵天言誰能聽如來如是法答言不漏六塵者註眼見色如盲等耳聞聲如聾等是謂不漏六塵能如是不漏則達無聽之聽是真能聽法者也梵天言誰能知是法答言無識無分別無諍訟者註無識則不緣名相無分別則不著外塵無諍訟則不執能所離此三者則自性靈明寂然常照是真能知也梵天言云何比丘名多諍訟答言是好是惡此名諍訟是理是非理此名諍訟是垢是淨此名諍訟是善是不善此名諍訟是戒是毀戒此名諍訟是應作是不應作此名諍訟以是法得道以是法得果此名諍訟註問好惡垢淨是理非理持戒毀戒得道得果原于佛說云何同名諍訟耶答教道別也昔時佛為鈍根眾生未堪直趣大道權標名相使知進修此一乘頓教名相蕩除理事不立直顯自心若立纖毫即名障礙二乘不了名相礙心所以文殊決擇者欲使法眼清淨也曰若然者好惡垢淨可名名相元無實體若執實有是成諍訟云何得道得果同彼諍訟答眾生躭著欲塵不求解脫佛說得道得果誘彼癡兒若出化城寶所非有執為實事諍訟由生故并揀之也梵天若於法中有高下心貪著所受皆是諍訟佛所說法無有諍訟梵天樂戲論者無不諍訟樂諍訟者無沙門法樂沙門法者無有妄想貪著註如來所說大小名相皆是稱理稱機無心演出無有戲論凡夫樂著戲論于無諍訟中熾然諍訟著諍訟者非沙門法也沙門云勤息息滅戲論妄想勤修聖道故云勤息云何凡夫名為戲論邪以求道心不真效人問辨實自無心故名戲論此如古人聞一句義終身受持倘或不明經年決擇以悟自期忽爾發明疑惑并消今人無書不讀滿肚懷疑隱隱自嗤逢人強辨直得最妙最玄於己一無造履故云上士一決一切了下士多聞多不信多聞多不信非戲論而何梵天言云何比丘隨佛語隨佛教答言若比丘稱讚毀辱其心不動是名隨佛教若比丘不隨文字語言是名隨佛語註稱讚者順境也毀辱者逆境也不為順逆所動是順佛之教也然則隨宜通變不在膠柱調絃若執實事則著文字語言非順佛語也以無定之語是名佛語不動不著妙契中道下皆倣此又比丘滅一切諸相是名隨佛教不違於義是名隨佛語註破相顯空教門所載或奪或與各有其義比丘取捨得宜是名不違其義若比丘守護於法是名隨佛教若不違佛語是名隨佛語註蕩除名相直顯自心不為外論所害是守護法一切邪正同歸法性是佛之語若執彼邪我正親疎法性是違佛語若了即邪即正無二無別是名不違以真心妙融即遮即照教道安立或破或顯縱奪無方須得心融意會耳梵天言云何比丘能守護法答言若比丘不逆平等不壞法性是名能守護法註心佛及眾生是三無差別故曰平等若分彼聖我凡是乖平等乖平等者起諍論起諍論者不能守護法也法性即是平等之實相若謂轉凡入聖是壞法性以法性各住一際如鐘鼓之聲彼此不相到故所以不壞法性者乃不乖平等也梵天言云何比丘親近於佛答言若比丘於諸法中不見有法若近若遠是名親近於佛註前梵天問佛親近佛答盡命不毀禁者與此文殊所答若何異也以梵天說諸法正性之門顯理極圓佛指事行使無混濫如法華三週法竟說四安樂行也此中文殊當擇法之任不見有法若近若遠為答者使法眼清明也梵天言云何比丘給侍於佛答言若比丘身口意無所作是名給侍於佛註身無非行口無惡言意無邪思且道那個是佛要汝給侍梵天言誰能供養佛答言不起福業不起不動業者註不起福業則不著有為不起不動業則不著無為前文所謂達無生際者梵天言誰能見佛答曰若不著肉眼不著天眼不著慧眼是名能見佛註肉眼礙非通是不能見天眼通非礙是能見以自性天真之佛不屬見故故能見不能見皆不見佛若離五眼之見是真見佛也不言佛眼法眼者文略也梵天言誰能見法答言不逆諸因緣法者梵天言誰能順見諸因緣法答言不起平等不見平等所生相者註諸法體是真空不礙緣起若礙緣起是逆因緣所謂順因緣者不執體是真空不起平等之想不執任運緣起不見平等所生之相也梵天言誰得真智答言不生不滅諸漏者註漏者所謂有漏欲漏無明漏也達漏體本是無生不生不滅是名真智二乘返此梵天言誰能隨學如來答言不起不受不取不捨諸法者註如來者即諸法如義能不起不受學如義也梵天言誰名正行答言不墮三界者註所謂不著欲不著禪不著空唯此不著名為正行也梵天言誰為善人答言不受後身者註世稱善人乃善惡對稱之善人其善即凡夫中善人也不受後身乃阿羅漢及一生菩薩妙契中道不著善惡二邊即聖人中善人也大學所謂止於至善非善惡所對之善也梵天言誰為樂人答言無我無我所者註我即是能主宰者我所即是能攀緣者內忘主宰外絕攀緣是真樂人也梵天言誰為得解脫者答言不壞縛者梵天言誰為得度答言不住生死不住涅槃者註若有生死可度則有不度生死者惟涅槃生死二邊不住是真得度也梵天言漏盡比丘盡何事耶答言若有所盡不名漏盡知諸漏空相隨如是知名為漏盡註既不住二邊度無所度比丘稱為漏盡當盡何事耶所言漏盡但盡妄想之相非謂有法可盡若有可盡不名漏盡矣梵天言誰能實語答言離諸言論道者註若離言論道是實語者則如來以言語論道豈為虗妄邪如來為破凡夫語言故假言論道非有言語也所以云他說的說箇不說的梵天言誰為入道答言凡夫有入道聖行者知一切有為法無所從來無所從去則無入道註凡夫不達有為性空妄計有入聖行者了三際平等故無入不入梵天言誰能見聖諦答言無有見聖諦者所以者何隨所有見皆為虗妄無所見者乃名見諦梵天言不見何法名為見諦答言不見一切諸見名為見諦註有見是常見無見是斷見亦有亦無是增益見非有非無是戲論見如是四見三世疊成六十二見名為諸見梵天言是諦當于何求答言當於四顛倒中求梵天言何故作如是說答言求四顛倒不得淨不得常不得樂不得我若不得淨是即不淨若不得常是即無常若不得樂是即為苦若不得我是即無我註於身受心法起常樂我淨四種顛倒何為顛倒邪身是不淨而計為淨心是無常計為常受是苦計為樂法是無我計為有我故佛說聖諦即彼顛倒而求觀身四大假合內外三十六物件件推求畢竟無淨是謂不淨觀心念念不住新新不停是謂無常觀一切苦受樂受不苦不樂受皆無安樂是之為苦觀五陰六入十二處十八界悉皆無性是謂無我如是常樂我淨皆由四顛倒之所顯發如是推求如是了達是名為諦梵天一切法空無我是為聖諦註上云求諦於四顛倒此特云法空為聖諦者以四顛倒皆依五陰等法之所出也若了五陰等空無我即彼四種顛倒皆名聖諦也若能如是求諦是人不見苦不斷集不證滅不脩道註如是求諦者了達法空了達法空故知法無生故不見苦知法無和合故不斷集知法本離生滅故不證滅知法無二相故不脩道梵天言云何名脩道答言若不分別是法是非法離於二相名為脩道以是道求一切法不得是名為道是道不令人離生死至涅槃所以者何不離不至乃名聖道註既云不證不修云何一切行人名為修道耶脩道者非是有修之修乃是無修之修也無修之修者知法無二故于無二法中求一切法不可得是之謂道求一切法不可得故生死不可得涅槃不可得生死不可得誰離生死涅槃不可得誰至涅槃以生死涅槃同入實際惟有名字故不至不離也爾時有摩訶羅梵天子名曰等行註梵語摩訶羅此云大梵天子名等行者前網明問云何比丘親近于佛問真諦也此天子問云何優婆塞皈依三寶者問俗諦也欲顯真俗不二即俗趨真故曰等行破在俗出家之執入無二門矣問文殊師利何謂優婆塞皈依佛皈依法皈依僧答言若優婆塞不起二見註總標下釋成不起之意不起我見不起彼見不起我見不起佛見不起我見不起法見不起我見不起僧見是名皈依佛皈依法皈依僧註清淨自心即是自己佛無作妙智即是自己法圓融梵行即是自己僧故曰佛者覺也法名平等僧名和合若捨己外求作二見解是不皈依也若能了達三寶即是自己彼我兩忘不起二見是真皈依也又優婆塞不以色見佛不以受想行識見佛是名皈依佛註清淨自心本無五蘊若著五蘊見佛則不見自心不名覺矣若了五蘊本空是則名覺是名皈依若優婆塞於法無所分別亦不行非法是名皈依法註法名平等于法非法無所分別然于是非分齊無所混濫雖無分別亦不行非法是則皈依也若優婆塞不離有為法見無為法不離無為法見有為法是名皈依僧註僧名和合若以有為為有為以無為為無為是即分別非和合矣以有為無為二而不二故名皈依和合也又優婆塞不得佛不得法不得僧是名皈依佛皈依法皈依僧註所言皈依者非謂外有所皈依也即是皈依自心達三寶體空惟有名字名字不可得故曰皈依也爾時等行菩薩問文殊師利言是諸菩薩發菩提心者為何所趣答言趣于虗空所以者何阿耨多羅三藐三菩提同虗空故註前云天子此云菩薩者以了悟皈依自心即名菩薩所以為頓教也既是皈依自心彼諸菩薩發心當趣何所彼發心者發無所趣心也以菩提同于虗空惟有名字無處所故等行言云何菩薩名發阿耨多羅三藐三菩提心答言若菩薩知一切發非發一切法非法一切眾生非眾生是名菩薩發阿耨多羅三藐三菩提心註既無所趣云何名為發心耶所言發心者知一切發心即是非發心一切法即是非法一切眾生即是非眾生直下頓證自己是名發心以無所得故也名字義品第十三註前云菩薩既云無二則彼此平等彼此平等則文殊普賢觀音勢至各無標的各無標的則彼此混濫然文殊等一一指陳歷歷明鑑何云無二非謂名字無二乃法體無二也是諸菩薩皆依法界中流出故曰無二以德立名不無指的故非無二也譬如水火風土皆依木出各以其能而稱則不同也此品名名字者依前無二品流出也爾時等行菩薩白佛言世尊所言菩薩菩薩者為何謂耶佛言善男子若菩薩於邪定眾生發大悲心於正定眾生不見殊異故言菩薩所以者何菩薩不為正定眾生不為不定眾生故發心但為度邪定眾生故而起大悲發阿耨多羅三藐三菩提心故名菩薩註梵語菩提薩埵此云覺眾生又云摩訶薩此云大道心眾生菩薩不以自利專欲利人緣彼邪定眾生而發大悲者大道心眾生也於彼正定眾生心不殊異者覺法平等無有彼此者覺眾生也不因不定眾生發心者以彼機未堪化故也爾時菩提菩薩白佛言世尊我亦樂說所以為菩薩佛言若樂說者便說註前則如來總彰菩薩之意此下別顯菩薩之德所以各說也菩提菩薩言譬如男子女人受一日戒無毀無缺若菩薩如是從初發心乃至成佛於其中間常修淨行是名菩薩註菩提云覺從初發心乃至成佛於其中間修行梵行猶若一日覺三世性空故也堅意菩薩言若菩薩成就深固慈心是名菩薩註以無緣慈深固其心故曰堅意度眾生菩薩言譬如橋船度人不倦無有分別若心如是是名菩薩註以無分別智度諸眾生猶如橋船無有分別也斷惡道菩薩言若菩薩於諸佛國投足之處即時一切惡道皆滅是名菩薩註以方便智入諸佛法滅於惡見也觀世音菩薩言若菩薩眾生見者即時必定於阿耨多羅三藐三菩提又稱其名得免眾苦是名菩薩註以自在慧入圓通性必定得菩提也稱名免苦者隨喜之益也得大勢菩薩言若菩薩所投足處震動三千大千世界及魔宮殿是名菩薩註觀經云以智慧光普照一切令離三塗得無上力名大勢至蓋以中道妙慧照破無明故魔王宮殿世界皆為震動也無疲倦菩薩言若恒河沙等劫為一日一夜以是三十日為一月十二月為一歲以是歲數若過百千萬億劫得值一佛如是於恒河沙等佛所行諸梵行脩集功德然後受阿耨多羅三藐三菩提記心不休息無有疲倦是名菩薩導師菩薩言若菩薩於墮邪道眾生生大悲心令入正道不求恩報是名菩薩註以深心大悲平等道達若求恩報則非平等不名菩薩也須彌山菩薩言若菩薩於一切法無所分別如須彌山一切眾色是名菩薩註以不動智入一切法無所分別猶如須彌處於大海七金山等一切眾色交暎巍然不動也那羅延菩薩言若菩薩不為一切煩惱所壞是名菩薩註梵語那羅延此云勇健以智慧勇健不為煩惱所壞也心力菩薩言若菩薩以心思惟一切諸法無有錯謬是名菩薩師子遊步自在菩薩言若菩薩於諸論中不怖不畏得深法忍能使一切外道怖畏是名菩薩註以無畏辨降伏外論喻如獅子遊步之自在也不可思議菩薩言若菩薩知心相不可思議無所思惟分別是名菩薩註以心非數量故知心相不可思議也善寂天子言若菩薩能於一切天宮中生而無所染亦不得是無染之法是名菩薩註欲界不為欲塵所染色界不為禪定所染無色界不為空見所染一切雖無所染亦不得是無染之見故曰善寂實語菩薩言若菩薩有所發言常以真實乃至夢中亦無妄語是名菩薩喜見菩薩言若菩薩能見一切色皆是佛色是名菩薩註體實色有青黃赤白等獨頭色有散位夢中及定果等色名為一切能見此一切皆是佛色者應云善見喜見者恐訛也常慘菩薩言若菩薩見墮生死眾生其心不樂世間諸樂欲自度己身亦度眾生是名菩薩註因眾生而起慘慽發大悲而思救度眾生無盡悲願無盡故曰常慘心無礙菩薩言若菩薩於一切煩惱眾魔而不嗔礙是名菩薩註魔宮佛土煩惱菩提不作二相是名無礙常喜根菩薩言若菩薩常以喜根自滿其願亦滿他願所作皆辦是名菩薩註七覺支中第四喜支根成滿其願自他俱辦故曰喜根散疑女菩薩言若菩薩於一切法中不生疑悔是名菩薩註八聖道中第八無漏慧斷除三業微細無明故曰散疑師子童女菩薩言若菩薩無男法無女法而現種種色身為成就眾生故是名菩薩註童女者兌之象也兌屬金主于秋成衰殺之候一切萬物至此成就故曰成就眾生名獅子者以法體中本無男女為眾生故現種種身是決定說故寶女菩薩言若菩薩於諸寶中不生愛樂但樂三寶是名菩薩毗舍佉達多優婆夷言若菩薩有所得者則無菩提若不得一切法不生一切法不滅一切法是名菩薩註凡有所得則無菩提者以菩提即是自妄想非謂覺矣若了一切法不可得即是得自性之覺得自性之覺即不生不滅矣䟦陀婆羅賢士言若菩薩眾生聞其名者畢定於阿耨多羅三藐三菩提是名菩薩註䟦陀婆羅云賢守亦云賢護既守且護故聞其名者定獲菩提矣寶月童子言若菩薩常修童子梵行乃至不以心念五欲何況身受是名菩薩忉利天子曼陀羅華香菩薩言若菩薩持戒熏心常流諸善法香不流餘香是名菩薩註曼陀羅云白華香以戒為白業故修此白淨業者則常流法香也作喜菩薩言若菩薩喜樂三法謂供養佛演說於法教化眾生是名菩薩註供養乃上求之利說法乃下化之功上求下化宜名菩薩也思益梵天言若菩薩所見之法皆是佛法是名菩薩註即俗而真無真不俗真俗既成一體則佛法不離所見也彌勒菩薩言若菩薩眾生見者即得慈心三昧是名菩薩註梵語梅怛利伽那此云慈氏以慈隆即世悲臻後劫故使見者皆獲慈心也文殊師利法王子言若菩薩雖說諸法而不起法想不起非法想是名菩薩註文殊為擇法眼善擇法要了證實相故雖說法不起法非法想無說是說故不起法想說是無說故不起非法想綱明菩薩言若菩薩光明能滅一切眾生煩惱是名菩薩註眾生為無明煩惱所敝猶如長夜若遇根本智光則無明煩惱當念無生矣普華菩薩言若菩薩見諸如來滿十方世界如林華敷是名菩薩註十方眾生皆是如來之性同敷萬行因華也如是諸菩薩各各隨所樂說已爾時佛告等行菩薩言若菩薩能代一切眾生受諸苦惱亦復能捨一切福事與諸眾生是名菩薩註上由等行菩薩問菩薩為何謂也而如來答拔諸邪定眾生起于大悲正定眾生心不殊異答其為義也末後云能代眾生之苦捨己之樂與諸眾生答其為德也始末皆如來答者一切梵行皆趨如來故所以啟問菩薩名等行者也中間諸菩薩各述己德使眾生隨所悟入也論寂品第十四註前諸菩薩各述己德隨所樂說者差別之義也名字雖則萬差論體其惟一寂若不會歸終成迷名滯跡之慾微細究明始獲達體忘情之旨了行非實則名本無當名實無當則一道平等故曰論寂爾時思益梵天問等行菩薩言善男子汝今以何行為行註汝名既云等行則染淨何分而正邪莫辨若有分辨則何名等行若不分辨則汝現前隨于何行而行耶答言我已隨一切有為法眾生行為行註棄有為而行無為則揀擇即世諦而行聖行是名平等以有為無為同入法性故也又問隨一切有為法眾生以何為行答言諸佛所行是隨一切有為法眾生行也又問諸佛以何為行答言諸佛以第一義空為行又問凡夫所行諸佛亦以是行有何差別等行言汝欲令空中有差別耶答言不也等行言如來不說一切法空耶答言然是故梵天一切法無有差別是諸行相亦復如是所以者何如來不說諸法有差別也註凡夫行于有為三乘行于無為諸佛行于第一義空所言第一義空者有為無為皆惟名字無有義理三乘不了義空于法性中妄起諍執作有無見凡聖成差大乘深明實際知有為無為皆第一義空于是空中何有彼此無彼此故號曰等行邇來道學宗師動輒言理不知理為礙本始終論義豈識義是禍苗若悟義理本空始知聖人無說爾時思益梵天問文殊師利言所言行處行為何謂也答言於諸行中有四梵行是名行處行若人離四梵行不名行處行能行四梵行是名行處行註四梵行者有四依行一者常行乞食二者著糞掃衣三者蘭若樹下住四者病以腐爛藥治此惟聲聞法非今經意有四觀行一者觀因緣二者觀果報三者觀自身四者觀佛身此亦初心行人所修非今經意有四安樂行一者身住菩薩行行處近處為眾說法二者口于末法中宣說妙法不樂說人及經典故三者意于法滅時受持斯經無懷嫉妬四者誓願以身口意與慈悲但發願流通此即今經意也由前凡夫諸佛行體無二若不擇住梵行則恐成混濫何也前欲顯理則纖跡不存寧容聖凡有異此中扶事則非是宛然不許邪正混同事理兩備方名究竟所以法華三周法竟說此安樂行門楞嚴見道以還方宣修行法則是皆聖賢千古不易之式也又殺盜淫妄四者乃梵行之門捨是別求則非行處梵天若人成就四梵行雖於空閑曠埜中行是名行處行若不成就四梵行雖於樓殿堂閣金銀牀榻妙好被褥於此中行不名行處行亦復不能善知行處相註所言成就者四種安樂行門及身無雜染等行也若成就此則不揀方所雖處曠埜猶居大眾以能說法要故也若不成就雖處大眾猶無一人以不能弘宣大法故亦不能知行處相又問菩薩以何行知見清淨答言於諸行中能淨我見註凡夫著于我見執於有為二乘著于我見執于無為二者雖則出生相返同歸虗妄若淨我見則有為無為皆歸實際者即是入正行入正行故則知見清淨又問若得我實性即得實知見耶答言然若見我實性即是實知見譬如國王典金藏人因己出用知餘在者如是因知我實性故得實知見註無我無我所是我實性達實性故則如是知如是見皆如實故譬如典金藏人因己出故知餘在者喻我及我所皆從己出本是無生而我本體曾無有動無動之體即實知見也又問云何得我實性答言若得無我法所以者何我畢竟無根本無決定故若能如是知者是名得我實性註凡夫不了執言有我若有我者四大六根何者是我若眼是我則耳鼻舌身應是非我若耳鼻等非我則誰聞誰齅若都是我則我成六我若都不是我捨是豈應別有如是推求則決定無有根本可得以無得故是名得我實性也又問如我解文殊師利所說義以見我故即是見佛所以者何我性即是佛性註見我性空佛性亦空文殊師利誰能見佛答言不壞我見者所以者何我見即是法見以法見能見佛註上云見我即是見佛此間誰能見佛似乎相反然梵天恐人壞我見而見實性重增取捨之端故復問之使知不壞我見而見實性也我見即是法見者由有我見法得興起因有法故有能覺者也又問頗有無所行名為正行耶答言有若不行一切有為法是名正行註由前不壞我見見佛然亦不著我見若著我見即行有為不名正行以正行不屬有為故不行是行也又問云何行名為正行答言若不為見故行不為斷不為證不為修故行是名正行註見苦斷集證滅修道不為四者所行名為正行以見苦無生知集無和合了滅無生滅悟道無二故也又問慧眼為見何法答言若有所見不名慧眼慧眼不見有為法不見無為法所以者何有為法皆虗妄分別無虗妄分別是名慧眼無為法空無所有過諸眼道是故慧眼亦不見無為法註由前無見見我實性無行名為正行既云無見無行所云慧眼當見何法夫慧眼者見無見無行之法也以慧眼鑑空空者空諸虗妄故不見有為眼以見色得名慧眼鑑空非色所及故超諸眼道而不見無為也又問頗有因緣正行比丘不得道果答言有正行中無道無果無行無得無有得果差別梵天無所得故乃名為得若有所得當知是為增上慢人正行者無增上慢無增上慢則無行無得註所言有因緣者有正行因緣故無行道無得果無得果差別者無聲聞辟支佛佛乘之差別也以正行中無所不行無所不行本一無行是為正行之因緣也又問得何法故名為得道答言若法不自生不他生亦不眾緣生從本已來常無有生得是法故說名得道註所謂得道者得是無生之道也無生偈曰諸法不自生亦不從他生不共不無因是故說無生不眾緣生者即不共生也缺無因生四處推求無一可得無可得故說名得道也又問若法不生為何所得答言若知法不生即名為得註若知法是無生則知心外無法可得無法可得得自心也是故佛說若見諸有為法不生相即入正位註文殊復引佛說為正者使行人畢竟以無生為得也在真諦則曰正性在俗諦則曰正位性屬自體位屬相用二者會歸總是一心又問云何名正位答言我及涅槃等不作二是名正位註我及我所涅槃生死菩提煩惱不作二見即離分別故也又行平等故名為正位以平等出諸苦惱故名正位註行平等者自持之德平等出諸苦惱者利人之行也自行利他均名平等者不思議也不思議故心無分別同名正位入了義中故名正位除一切憶念故名正位註入了義則遠離戲論除憶念則三世性空爾時世尊讚文殊師利言善哉善哉快說此言誠如所說說是法時七千比丘不受諸法漏盡心得解脫三萬二千諸天遠塵離垢得法眼淨十千人離欲得定註比丘不受諸法者破煩惱惑成般若德也天子得法眼淨者破塵沙惑證解脫德十千人離欲得定者離二邊欲獲中道定破無明惑證法身德也二百人發阿耨多羅三藐三菩提心五百菩薩得無生法忍爾時思益梵天白佛言世尊是文殊師利法王子能作佛事大饒益眾生文殊師利言佛出於世不為益法故出不為損法故出註佛出世者不離正位于正位中無損無益如是出世也梵天言佛豈不滅度無量眾生仁者亦不利益無量眾生耶文殊師利言汝欲於無眾生中得眾生耶答言不也梵天汝欲得眾生決定相耶答言不也梵天汝欲得諸佛有出生相於世間耶答言不也梵天何等是眾生為佛所滅度者梵天言如仁者所說義無生死無涅槃文殊師利言如是諸佛世尊不得生死不得涅槃佛諸弟子得解脫者亦不得生死不得涅槃所以者何是涅槃是生死但假名字有言說耳實無生死往來滅度涅槃註真如界內絕生佛之假名平等性中離自化之幻相假名既絕則眾生何曾決定幻相既離則諸佛那得度生無生死可度無決定可得則一切萬法歸一寂矣前正問品中網明問佛不為度生死故說法耶而梵天答曰佛所示法有度生死耶如此則梵天非謂不明何以此中復問文殊似若無知何也前則梵天據正性而答網明亦非不知此中論寂梵天豈云未諳皆于佛事門中互興問答發明奧旨使行人有所趨何也蓋此非淺機所知耳又問誰能信是法耶答言於諸法中無貪著者又問若貪著者於何貪著答言貪著者貪著虗妄梵天若貪著是實者終無憎上慢以貪著虗妄故行者知之而不貪著若不貪著則無有流若無有流則無往來生死若無往來生死是則滅度註溈山偈曰未達法唯心起種種分別是為貪著虗妄分別不能信是法者也達法唯心已分別即不生是遠離虗妄分別能信是法者也若虗妄分別是實則彼貪著者不為憎上慢也以虗妄分別如水中月鏡中像極其心機終不可得不了無得妄為有得是皆憎上慢也又問何故說言滅度註既云不得生死不得涅槃則滅度之名空說不知滅者滅其虗妄度者度其執著耳答言滅度者名為眾緣不和合若無明不和合諸行因緣則不起諸行若不起諸行是名為滅不起相是畢竟滅得是道故則無生處如是名為四聖諦註眾緣不和合者即十二因緣不和合也以無明緣行行緣識識緣名色乃至生老病死次第生起若無明不與行等十二和合則行等十二無由得起是名為滅不起行識名色等相是畢竟滅畢竟滅者但滅無明等十二相不滅其性是為得道是名滅度以生死不可得涅槃不可得但滅其無明妄想耳如來二事品第十五註前菩薩名字品出無說而說也以法本無說由諸菩薩德行萬差各述所以故有言說次論寂品乃說即無說也由名字異說有差別文字性空體惟一寂此品合彼二事皆如來法施之式也故永嘉曰默時說說時默大施門開無壅塞皆是妙會一心也爾時等行菩薩謂文殊師利如汝所說皆為真實答言一切言說皆為真實註豈特文殊之言為真實邪一切外道凡夫所有言語無不真實下文釋其皆真實之意又問虗妄言說亦真實耶答言如是所以者何是諸言說皆為虗妄無處無方若法皆虗妄無處無方是故一切言說皆是真實善男子提婆達語如來語無異無別所以者何一切言說皆是如來言說不出如故一切言說有所說事皆以無所說故得有所說是以一切言說皆平等文字同故文字無念故文字空故註若以分別相取則聖賢言說為真實凡夫言說為虗妄若平等諦觀則聖賢言說亦名虗妄而凡夫言說亦名真實何也以一切言說皆無性故來無所從故言無處去無所至故言無方無處無方皆由緣興緣滅剎那不住前際不來後際不去中亦無住於無住中假現文字文字性空無有念想故如來語與提婆達語皆平等無有差別也等行言如來不說凡夫語言聖賢語言耶文殊師利言然以文字說凡夫語言亦以文字說賢聖語言如是善男子諸文字有分別是凡夫語言是賢聖語言等行言不也文殊師利言如諸文字無分別一切賢聖亦無分別是故賢聖無有言說所以者何賢聖不以文字相不以眾生相不以法相有所說也譬諸鐘鼓眾緣和合而有音聲是諸鐘鼓亦無分別如是諸賢聖善知眾因緣故於諸言說無貪無礙註若謂一切言說文字無有念性均一虗妄則如來豈不說凡夫賢聖耶文殊答曰然如來所說皆由文字詮表而有差別以文字無性無有念想分別而凡夫語賢聖語亦無性無有念想分別由如鐘鼓之聲緣合成音豈為有性耶所言緣合者如鐘鼓之聲緣皮緣木緣金緣人如是等緣和合成音本是無性而凡夫語言聖賢語言外緣事理內緣脣舌牙齒神氣等緣和合成音若缺其一音則不成豈非無性而賢聖了此無性故無貪無礙凡夫不了多生執著故凡聖似差無性體同寧有二致等行言如佛所說汝等集會當行二事若說法若聖默然何謂說法何謂聖默然答言若說法不違佛不違法不違僧是名說法若知法即是佛離相即是法無為即是僧是名聖默然註佛以覺了為義法以平等為義僧以和合為義若不迷于覺不著分別不壞和合是名說法若法平等覺了不迷即是佛覺了不迷遠離虗妄幻相即是法了法無生無為順入即是僧此即一體三寶備在自己不言而喻故曰默然又善男子因四念處有所說名為說法於一切法無所憶念名聖默然註四念處者身受心法也觀身無常觀受是苦觀心是空觀法無我佛欲眾生出離如是教誡名為說法了此性空無所憶念是名默然因四正勤有所說名為說法以諸法等不作等不作不等名聖默然註四正勤者一斷已生惡法如除毒蛇二斷未生惡法如防流水三增長已生善如溉甘果四未生善為生如鑽木出火如是開示名為說法然如來等觀諸法無勤不勤非等不等了法無是故曰默然因四如意足有所說名為說法若不起身心名聖默然註四如意者欲念進慧以心慕勝欲繫念正住精進無間不令馳散智定力等所願皆得名如意足因五根五力有所說名為說法若不隨他語有所信為不取不捨故分別諸法一心安住無念念中解一切法常定性斷一切戲論慧名聖默然註信進念定慧分開根力聖道仗此出生故曰根心獲相應故曰力根中五者一信諦理出生無漏功德二䇿善進修不懈三念正助之道皆出世正因四攝心在道不令馳散五決擇邪正明白不濫力中五者一得信力故不為疑惑所動二得進力故用心無間不至聖道不休三得念力故能破邊見不為煩惱所破四得定力故能破欲界所繫于諸禪定互無妨礙五得慧力故能破邪外等論又能破自己見愛等執不隨他語者得信力也不取不捨者得進力也安住無念者得念力也解法常定者得定力也斷戲論慧者得慧力也根力有五契心一念一念亦無無所得故謂之默然因七菩提分有所說名為說法若常行捨心無所分別無增無減名聖默然註七菩提者即念擇進喜輕安定捨由得五力于菩提有分證之益緣念大乘決擇實相進修無漏喜獲相應此四者治其沈心之相獲相應故獲得輕安由輕安故定心入禪由入禪故捨于觀智如是開示名為說法常行捨心者即念念無著因地果覺無增無減無所分別故曰默然因八聖道分有所說名為說法若知說法相如栰喻不依法不依非法名聖默然註八聖道者見思惟語業精進念定命見謂修無漏十六行故明見四諦思惟者謂以正思惟發動正道觀心語謂以無漏智除口邪命常攝口業住正語中業謂以無漏智除身邪命住于清淨正身業中此四者舉其治修之行精謂勤修涅槃善入正諦此通前後定謂正住於法決定不移念謂心不動失正直不忘命謂以無漏智慧通除三業中五種邪命住于正命此三者總收意業獲相應心也如是八種開示本乎無說為度眾生故現言說猶如船栰意在濟人不著彼岸不著此岸不住中流如是說法不依有為不依無為不依法不依非法說是無說無說是說所謂默然同一幻興無有實性故般若云汝等比丘知我說法如筏喻者善男子於是三十七助道法若能開解演說名為說法若身證是法亦不離身見法亦不離法見身於是觀中不見二相不見不二相如是現前知見而亦不見名聖默然註總指三十七助道品于法體本無方便應世建立名相若能親證則于法于身不作二不作不二所謂自證不可得也又善男子若不妄想著我不妄想著彼不妄想著法有所說名為說法若至不可說相能離一切言說音聲得不動處入離相心名聖默然註彼我說法皆妄想有若無妄想名字皆空如來以此勸誘故名為說法若悟不可說相知一切音聲皆無所入矣又善男子若知一切眾生諸根利鈍而教誨之名為說法常入於定心不散亂名聖默然註是知說法皆因對機默然皆由自證以自證故說即無說利眾生故無說為說是二者皆一心建立也等行言如我解文殊師利所說義一切聲聞辟支佛無有說法亦無聖默然所以者何是人不能了知一切眾生諸根利鈍亦復不能常在於定文殊師利若有真實問何等是世間說法者何等是世間聖默然者則當為說諸佛是也所以者何諸佛善能分別一切眾生諸根利鈍亦常在定佛告文殊師利如是如是如等行所說唯諸如來有此二法註既是如來具此二事餘不應有云何佛不自說而文殊說也以文殊為擇法眼故佛住第一義故第一義中不容有說在第二義門方便提獎佛告文殊而印可等行者以一真法界若動若靜若語若默若大若小若邪若正等而行之不起二見不起二見是如來行也爾時須菩提白佛言世尊我親從佛聞汝等集會當行二事若說法若聖默然世尊若聲聞不能行者云何如來勅諸比丘行此二事佛告須菩提於汝意云何若聲聞不從他聞能說法能聖默然不須菩提言不也須菩提是故當知一切聲聞辟支佛無有說法無聖默然註須菩提云空生以解空第一故此中啟請由前等行不起二見等心而行若不會歸空際則是非皎然安能等行哉故須菩提發起會歸空也聲聞辟支佛無此二事者心存得失未能等觀入空者也如來有者如來即諸法如義如即空也動靜說默皆由空之所出也爾時文殊師利謂須菩提如來了知眾生八萬四千行汝於此中有智慧能隨其所應為說法不答言不也今須菩提能入觀一切眾生心三昧住是三昧通達一切眾生心心所行自心他心無所妨礙不答言不也文殊師利言須菩提如來於眾生八萬四千行隨其所應為說法藥又常住定平等相中心不動搖而通達一切眾生心心所行須菩提是故當知一切聲聞辟支佛不及此事註須菩提意謂我親聞佛勅諸比丘行此二事若云無分勅彼何為而佛答非謂無分但無己智分也動轉施為皆仗佛力如官家僕使一切所為皆依主出而文殊重釋其意者非惟無己智分實乃力之不逮耳蓋十力四無畏十八不共法二乘全無五眼六通二乘分證如來圓證不能入觀眾生心三昧者即入一切語言三昧也以此三昧生佛同具二乘分證自心不能遍證他心以不能遍證故不能住是三昧以分別未忘故也以不能故于自心他心心王心所皆不能無妨礙也以不能無礙不能觀機說法故於二事二乘無分如來一一超過故此二事惟如來有如禮樂刑政皆天子出非庶民有也須菩提或有眾生多淫欲者以觀淨得解脫不以不淨唯佛能知註多欲眾生如來于小乘教中令觀不淨觀而得解脫如優波尼沙陀等于大乘惟觀欲性無生而得解脫如淨名與二比丘說罪性空等或有眾生多瞋恚者以觀過得解脫不以慈心惟佛能知註小乘教中佛令多瞋眾生修慈心觀大乘中不修對治而返求諸己也故小乘觀門不足喻也或有眾生多愚癡者以不共語得解脫不以說法唯佛能知註由說法故令彼愚癡轉得智慧是佛常說今云不共語而得解脫者蓋如來觀機之說無有定方或勸而發心或激而發心各隨其宜非二乘所知也何謂激而發心耶如阿那律陀性好打睡佛以偈呵曰終日恰恰睡螺螄蚌蛤類一睡一千年不聞佛名字更不與語律陀聞偈自責七日不眠失去兩目得半頭天眼證無學果是不與語而使發心者也夫子亦曰朽木不可雕也或有眾生等分行者不以觀淨不以不淨不以觀過不以慈心不以不共語不以說法得解脫者隨其根性以諸法平等而為說法使得解脫惟佛能知是故如來於諸說法人中為最第一禪定人中亦最第一註等分行者即于貪瞋癡等分也貪瞋癡等分者為說諸法平等得解脫也此上四節文殊與釋如來善知自心他心心王心所應病與藥之意也說法人中第一者釋能隨宜說法也禪定人中第一者釋雖則說法常在於定也爾時須菩提問文殊師利若聲聞辟支佛不能如是說法不能如是聖默然者諸菩薩有成就如是功德能說法能聖默然不答言惟佛當知註文殊答空生之問歷歷分明及乎問菩薩能如是不而文殊不即與答而曰惟佛當知似乎不能何也葢不逞自能不衒己德是聖賢之語式也若言其能則有不能失故曰語忌十成者不欲斷絕也機貴回互者不欲染汙也雖然若問圓澄又且不然但向他道現分析次於是佛告須菩提有三昧名入一切語言心不散亂若菩薩成就是三昧皆得是功德註一切語言三昧者即法性三昧也以法性無性隨類妙應如絲竹管絃于中實無音性故巧合工商文殊不即答者顯性故也如來與答者顯法妙指故也爾時文殊師利謂等行菩薩善男子為眾生八萬四千行故說八萬四千法藏名為說法常在一切滅受想定中名聖默然善男子我若一劫若減一劫演說是義是名說法相是聖默然相猶不能盡註由眾生塵勞行故說此法藏則知無故說說是無說說法默然二而不二不二故經劫不能盡也於是佛告等行菩薩善男子乃往過去無量無邊不可思議阿僧祇劫時世有佛號曰普光劫曰名聞國名喜見註以出過思量中道智光等照二邊故曰普光此智十界同見故曰名聞能悟此智則獲聖果故曰喜見用表前說法默然二事雙運之謂也彼國嚴淨註離二邊垢也豐樂安隱註多饒法寶故言豐樂常在於定故言安隱天人熾盛其地皆以眾寶莊嚴柔輭細滑生寶蓮華一切香樹充滿其中常出妙香註其佛以二事雙運為因地以平等妙行為資助故感眾寶嚴地平等無諍故感柔輭細滑蓮華不著垢淨不離垢淨表中道智不即二邊不壞二邊也一切香樹常出妙香依此中道智出生諸功德妙香也善男子喜見國土有四百億四天下一一四天下縱廣八萬四千由旬其中諸城縱廣一由旬皆以眾寶校飾一一城者有二萬五千聚落村邑而圍繞之一一聚落村邑無量百千人眾充滿其中彼時人民所見色像心皆欣悅無可憎惡亦悉皆得念佛三昧是以國土名曰喜見註所見色像心皆欣悅者以中道智平等無有分別無分別故所見一切色皆是佛色無可取捨無取捨故無憎惡也若他方世界諸來菩薩皆得快樂餘國不爾註一切方便異門皆依中道而得快樂捨是其餘皆不名快樂矣善男子其普光佛以三乘法為弟子說亦多樂說如是法言汝等比丘當行二事若說法若聖默然註是一而三不礙中道不礙中道故二事竝行也善男子爾時上方醫王佛土有二菩薩一名無盡意二名益意來詣普光佛所頭面禮佛足右繞三匝恭敬合掌却住一面註以方便智調伏眾生故曰醫王上方非堅礙之界用表實際謂方便智依實際而住故曰上方文云能知一切眾生諸根利鈍而教誨之而亦常在于定是此義也一名無盡意者依此方便智而脩行調伏無盡也二名益意者依此方便智而增益利樂也從醫王佛土來詣普光佛所者即方便智趣中道之像也此經頓教一往論辯皆稱絕待若非方便何云去來細觀可知時普光佛為二菩薩廣說淨明三昧所以名曰淨明三昧者若菩薩入是三昧即得解脫一切諸相及煩惱著亦於一切佛法得淨光明是故名為淨明三昧註即方便智示以根本智也前所謂諸法正性正行等也以正性離分別故解脫諸相正行無行故離諸煩惱以根本智逈絕依故于佛法得明淨也又前際一切法淨後際一切法淨現在一切法淨是三世畢竟淨無能令不淨性常淨故是以說一切諸法性常清淨註以根本智門非三世所攝不屬垢淨體是無染不能使之不淨如珠如玉水精琉璃真體如是誰能使不淨無能使不淨是謂畢竟淨也何謂諸法性淨謂一切法空相離有所得故一切法無相相離憶想分別故一切法無作相不取不捨無求無願畢竟離自性故是名性常清淨註法無處所故言空法無形段故言無相相法無能所故言無作此三解脫門之相即是性常淨之相也以是常淨相知生死性即是涅槃性涅槃性即是一切法性註涅槃云寂滅以剎那無生相可得剎那無滅相可得以生滅不可得故為一切法所依故曰法性是故說心性常清淨善男子譬如虗空若受垢汙無有是處心性亦如是若有垢汙無有是處註此喻心性本來是淨非使之淨也又如虗空雖為烟塵雲霧覆曀不明不淨而不能染汙虗空之性設染汙者不可復淨以虗空實不染汙故還見清淨凡夫心亦如是雖邪憶念起諸煩惱然其心性不可垢汙設垢汙者不可復淨以心相實不可垢汙性常明淨是故心得解脫善男子是名入淨明三昧門註此喻心性即染而淨非謂離染而淨也彼二菩薩聞是三昧於諸法中得不可思議法光明註此乃方便趨中道之益也爾時無盡意菩薩白普光如來言世尊我等已聞入淨明三昧當以何行行此法門佛告無盡意善男子汝等當行二行若說法若聖默然時二菩薩從佛受教頭面禮佛足繞三帀而出趣一園林自以神力化作寶樓于中脩行註園林者總持也以此二法雙運故趣總持也樓以高顯為義修行此勝行也時有梵天名曰妙光與七萬二千梵俱來至其所頭面禮足問二菩薩善男子普光如來說言汝等比丘集會當行二事若說法若聖默然善男子何謂說法何謂聖默然二菩薩言汝今善聽我當少說唯有如來乃通達耳於是二菩薩以二句義為諸梵眾廣分別說時七萬二千梵皆得無生法忍妙光梵天得普光明三昧是二菩薩於七萬六千歲以無礙辯才答其所問不懈不息分別二句互相問答而不窮盡註前二菩薩從普光如來聞淨明三昧得不可思議法光明者破煩惱惑故曰淨明證般若德故曰不可思議真諦之道備矣此中梵天名妙光者由不思議光之所出也故妙光等皆從二菩薩聞法得證所謂靜極光通達矣二菩薩由醫王佛而來普光佛所者由俗趣真之像也此中二菩薩與梵天說二句義者融真會俗之像也梵天者俗諦也妙光者即真即俗故曰妙光真諦無說以方便故說方便者第二義門也故曰二菩薩少說名數差別故曰七萬二千梵得無生法忍者會差別歸于實際也妙光梵天得普光明三昧者破塵沙惑證解脫德故曰普光明俗諦之道備矣二句義互相問答經七萬六千歲所謂第二義也於是普光如來在虗空中作如是言善男子勿於文字言說而起諍訟凡諸言說皆空如響如所問答亦復如是汝等二人皆得無礙辯才及無盡陀羅尼若於一劫若百劫說此二句辯不可盡善男子佛法是寂滅相第一之義此中無有文字不可得說諸所言說皆無義利是故汝等當隨此義勿隨文字是二菩薩聞佛教已默然而止註普光如來在虗空中告二菩薩勿著文字而起諍訟者虗空非堅礙之界用表實際也上不依天下不著地在虗空之中表中道也收前真俗二門會歸中道破無明惑證法身德故曰佛法是寂滅相第一之義蓋真俗二邊多致諍訟第一義中無有諍訟也在真諦則曰得不可思議法光明在俗諦則曰得普光明三昧以其有得則有不得故致諍訟在中道第一義諦中則曰默然而止以其無得則無有不得故無諍訟也問勿隨文字當隨此義如何此義答水向石中流出冷風從花裏過來香佛告等行以是當知菩薩若以辯才說法於百千萬劫若過百千萬劫不可窮盡又告等行於意云何彼二菩薩豈異人乎勿造斯觀註若謂二菩薩是他人要且不然勿造斯觀當知即是汝等非有他也無盡意者今文殊師利是註以方便智即根本智之像也益意菩薩者今汝身是註以分別智即無分別智之像也由分別觀察增益利樂故曰益意于第一義心不動故曰等行妙光梵天者今思益梵天是也註由真出假遊于俗諦故曰梵天即俗照真故曰妙光所謂即俗照真者即今思慧也爾時等行菩薩白佛言未曾有也世尊諸佛菩薩為大饒益如所說行精進眾生世尊其懈怠不能如所說行者雖值百千萬佛無能為也當知從勤精進得出菩提得聖道品第十六註以不二法得道謂之聖道由前說法不礙默然說即無說也默然不礙說法無說即說也若行人能通達此二而不二是謂得聖道也若二者各執則非得聖道矣前文四聖諦品者開示之謂也此中得聖道品者悟之謂也爾時文殊師利謂等行菩薩善男子汝知菩薩云何行名勤精進答言若菩薩能得聖道名勤精進註前文等行云佛為饒益精進眾生其懈怠者雖值多佛無能為文殊恐人著于有為故有此問而等行不言精進不說懈怠但曰得聖道而已則知精進者非精進之精進矣又問云何行能得聖道答言若於諸法無所分別如是行者能得聖道註雖知無精進為精進而未知無得為得文殊恐人著于有行有得所以問過而等行不答有得不答無得不答有行不答無行但曰無所分別無分別者不分別得與不得不分別行與不行當如是而行如是而得也又問云何名為得聖道已答言若行者於平等中見諸法平等是名得聖道已註所謂得聖道者得無所得也若得無所得云何知其已得聖道邪若能見諸法平等則為已得非別有所得也又問平等可得見耶答言不也所以者何若平等可見則非平等註所言平等者不可思議之謂也故曰識不能識智不能知思惟不能及分別不能解故非可見若可見者非不思議之境也思益梵天謂文殊師利若行者於平等中不見諸法是名得聖道已文殊師利言何故不見思益言離二相故不見不見即是正見註前等行謂平等中見諸法平等是名得道而復云平等不可見平等不可見則諸法可見乎而梵天復答意云于平等中諸法尚不見何平等可見也又問誰能正見世間答言不壞世間相者又問云何為不壞世間相答言色如無別無異受想行識如無別無異若行者見五陰平等如相是名正見世間註上云不見為正見者指何物為正見邪故文殊發明其意云誰能正見世間出其相也以五陰乃妄見之相猶如空華本無所有不名正見若謂無見亦不名正見若知五陰與如無異無別是名正見若于五陰起有無見是名分別若離五陰求于正見是壞世間相是二者非正見矣又問何等是世間相答言滅盡是世間相註上云正見世間者不壞世間相不壞世間相者以五陰與如無別無異若五陰與如無別無異指何物為世間相耶滅盡是世間相以世間相無盡不盡故若滅盡是世間相是相寧可盡耶以五陰念念不住是滅盡相若可盡者則後陰不復生矣若後陰不生則何物于中念念不住耶又問滅盡相復可盡耶答言滅盡相者不可盡也又問何故說言世間是滅盡相答言世間畢竟盡相是相不可盡所以者何已盡者不復盡也註若云滅盡相不可盡則何故言世間是滅盡相耶以世間相畢竟無體故念念出生有何可盡也猶如虗空畢竟無體四時運育而無間息若空有體不復更空也又問佛不說一切有為法是盡相耶答言世間是盡相終不可盡是故佛說一切有為法是盡相註若世間相不盡則佛豈不說有為是盡相邪然有為是盡相念念不可得故如世間相亦念念不可得而亦念念出生故有為是盡相亦是不盡相若可盡者不必更盡也又問何等數名有為法答言以盡相故名有為法註前諸問答皆心王相應之法也此中特問心數法也心王心數各有相應故數謂五十一心所也謂遍行別境各具五善有十一二十四個不相應根本無明有六種四個不定此五十一心數是世間盡相名為有為法也又問有為法者為住何所答言無為性中住註佛為外道不了自心心外求法故說惟識相宗權分名數一一指歸自心達自心已則知名數無別有住住無為也又問有為法無為法有何差別答言有為法無為法文字言說有差別耳所以者何以文字言說言是有為是無為若求有為無為實相則無差別以實相無差別故註若有為法住無為性則無差別其差別者何實無差別可得耳由文字言說詮量故成差別非謂實相有差別也又問何等是諸法實相義答言一切法平等無有差別是諸法實相義又問何等為義答言以文字說令人得解故名為義所以者何實相義者不如文字所說諸佛雖以文字有所言說而於實相無所增減文殊師利一切言說皆非言說是故佛語名不可說諸佛不可以言相說故註所言實相無有差別者未審實相以何為義所謂實相者以文字教人令彼得解脫文字性空則悟說無可說是實相義以文字教人令彼得解文字性空故諸佛雖有所說于實相無所增減矣又問云何得說佛相答言諸佛如來不可以色身說相不可以三十二相說相不可以諸功德法說相註諸佛相者即是實相故不可以色身等相說相也此以泯相門論實相也又問諸佛可以離色身三十二相諸功德法而說相耶答言不也所以者何色身如三十二相如諸功德法如註此以即相門論實相也諸佛不即是如亦非離如如是可說佛相不失如故註不即不離是如來相故又問諸佛世尊得何等故號名為佛答言諸佛世尊通達諸法性相如故說名為佛正徧知者註此上一十六品以具信解行證一週佛事已竟故自光明品至歎功德五品以成其信自五力說法品至菩薩授記品以成其解自薩婆若品至如來二事五品以成其行惟得聖道品以獲其證惟信解行證一席圓具故標此經為頓教大乘也志大乘品第十七註前十六品當機一週獲益已竟此下八品收彼未來故說此品勸令志慕大乘勿迷小道以彼小乘是權非實誑誘小兒大乘是實非權可令日用頓證重顯大乘有如是深益故當志慕亦使自擇也於是等行菩薩白佛言世尊何謂菩薩發行大乘爾時世尊以偈答曰註菩薩名等行者用表法界體無大小淨穢乃至邪正是非分別等而行之故曰等行為破二乘分別取捨執也然于初心行人不可大小混濫以迷進趣之方故須擇也楞嚴曰聖性無不通逆順皆方便初心入三昧遲速不同倫故所謂無分別中不礙熾然分別此之謂歟菩薩不壞色發行菩提心知色即菩提是名行菩提如色菩提然等人於如相註小乘用生滅四諦修析色入空雖出分段生死未盡變易大乘用無作四諦修即色即空無別有空故二死永盡色與行人菩提三者皆同一如相耳不壞諸法性是名行菩提註色是有義法性是空義既不壞有而行菩提亦不滅空而取菩提也不壞諸法性則為菩提義是菩提義中亦無有菩提註菩提云覺覺法實性是名菩提實性即是無性無性中亦無菩提之名字也正行第一義是名行菩提註前二節不壞空有行于菩提此中不涉空有行于菩提以第一義中非空非有故愚於陰界入而欲求菩提陰界入即是離是無菩提註五陰指前色法界入指前法性此中出過云愚人離是求于菩提則壞彼色及法性而求菩提不知離是無可求也若有諸菩薩於上中下法不取亦不捨是名行菩提註析色入空是為小乘體色入空是為中乘即色即空是上乘如是三者同依法性無可分別知是方便故不取于化導有益故不捨若法及非法不分別為二亦不得不二是名行菩提若二則有為非二則無為離是二邊者是名行菩提註前則于有無二邊雙遮雙照不即不離此則于法非法不起二見不起二見則分別斯泯矣是人過凡夫亦不入法位未得果而聖是世間福田行于世間法處中若蓮華遵脩最上道是名行菩提註此中結證前文若有如是之人能于有無二邊遮照之用則如蓮華雖處汙泥不為所染是人雖處世間不為所染遵修妙道為世福田也過凡夫者不住有也不入法位者不住空也有如是慕道雖然未證聖果亦是聖人也世間所行處悉於是中行世間所貪著於中得解脫註世間之行有為也亦不離菩提而有可行矣皆菩提而行貪著然亦因菩提而得解脫也菩薩無所畏不沒生死淵無憂無疲倦而行菩提道註前則解脫有為皆依菩提此中菩薩于生死中不沒不疲皆由菩提而使之然也斯人能善知法性真實相是故不分別是法是非法行於佛道時無法可捨離亦無法可受是名菩提相註此中結成不分別之意以達實相故有為無可捨無為無可取惟此無分別是菩提相也一切法無相猶若如虗空終不作是念是相是可相註以虗空無心識故無念無相無念無相故則無取無捨一切法亦無念相故無取無捨以喻合顯也善知世所行徧知方便力能充滿一切眾生之所願常住於平等護持佛正法註前依無分別智行于菩提此依方便智導人菩提何用方便邪為護正法故一切無所念則是如來法若有佛無佛是法常住世能通達是相是名護持法註此釋護法之意也所言護法者非護他法蓋護自心也以此無念之心非于有佛而為之有非于無佛而為之無有佛無佛此心常住故當護持耳諸法之實相了達知其義安住於此中而為人演說註若諸法不了實相是名謗佛非說法也若能安住實相然後乃可耳行於甚深法魔所不能測是人於諸法無所貪著故註于法若有貪著則不落于有則落于無若無貪著則不落二邊是謂甚深故魔不能測矣願求諸佛慧亦不著願求是慧於十方求之不可得諸佛慧無礙不著法非法若能不著此究竟得佛道註於十方求慧不可得者當求于自心求慧于自心故雖有願求而亦不著若有所著則非無礙之佛慧矣其諸樂善人布施轉高尊捨一切所有而心不傾樂註凡夫行施謂得樂報故心生歡喜若行人捨諸所有而心不歡樂達施無施也諸法不可捨亦復不可取註此釋成不傾樂之意也一切世間法根本不可得註此轉釋不可取捨之意也能知一切法非施非捨相是名大施主於法無所見註結歸行實相之施也是等諸菩薩不計我我所是故行施時不生貪惜心諸所有布施皆迴向佛道布施及菩提不住是二相註不住布施則不住因不住菩提則不住果因果不住則迴向佛道矣無作無起戒常住於此中亦不作念言我住是持戒註小乘持戒作止持犯事事有為大乘無作無起常契道共所謂持無相戒也智者知戒相不生亦不作是故戒清淨猶若如虗空觀身如鏡像言說如響聲心則如幻化不以戒自高註持戒所由因乎三業求三業不可得則持戒亦不可得不當自高也其心常柔輭安住寂滅性悉滅一切惡通達於善法持戒及毀戒不得此二相如是見法性則持無漏戒註柔輭乃定共之戒寂滅乃道共之戒此二者即攝眾生戒也滅惡乃攝律儀戒達善乃攝善法戒此舉三聚淨戒也持毀不二者用顯此三聚戒亦即大乘無相戒也已度忍辱岸能忍一切惡於諸眾生類其心常平等諸法念念滅其性常不住於中無罵辱亦無有恭敬若節節解身其心終不動知心不在內亦復不在外身怨及刀杖皆從四大起於地水火風未嘗有傷損通達於此事常行忍辱法菩薩行如是眾生不能動註此中忍辱有三種謂調順忍生忍無生忍初云能忍諸惡者即是生忍次云心平等者即是調順忍三云法念念滅者即是無生法忍是下所有偈文皆釋無生法忍之意也勇猛勤精進堅住於大乘是人於身心而無所依止註小乘著身心雖行精進不出有為大乘身心無有依止則是無精進之精進也雖知生死本其際不可得為諸眾生故莊嚴大誓願註菩薩知生死本際不得曷用精進邪然為化眾生故不捨大誓莊嚴也法無決定性何許有滅相本際不可得為顛倒故說法性不可議常住於世間若能知如是不生亦不滅菩薩念眾生不解是法相為之勤精進令得離顛倒註一切法本無決定非生非滅菩薩何用精進滅彼虗妄耶蓋由眾生不解如是無生滅性著諸虗妄故現行精進令彼滅顛倒耳諸佛常不得眾生決定相而彼弘本願當觀精進力註若菩薩為眾生而起精進者可有眾生決定相耶釋云佛不觀眾生有決定相菩薩欲弘本願故觀精進耳思惟一切法知皆如幻化不得堅牢相觀之如虗空從虗妄分別貪著生苦惱為斯開法門令得入涅槃為彼行精進而不壞於法離法非法故常行真精進註此釋觀精進之意以勤勇無間之力觀于世間無有堅牢而眾生不了虗妄貪著生苦而菩薩行于精進然二乘不悟無生于法非法起於取捨不成精進大乘于此二邊遠離故名真精進矣是等行遠離了達無諍定註由精進故獲得聲聞定也獨處無憒閙常畏於生死樂住於閒居猶如犀一角遊戲諸禪定明達諸神通心常住平等處空閑聚落威儀無變異恒樂於禪定註此由精進故獲得辟支佛定也辟支觀還滅十二因緣悟知萬法無生故心住平等但不知眾生等有故名獨覺也信解常定法及寂滅無漏其心得解脫故說常定者註此因精進獲解大乘常定前聲聞辟支皆作意定此乃無作妙定剎那無生相可得剎那無滅相可得故謂之寂滅惟寂滅故不漏落二邊復謂之無漏標名有三釋意惟一以名異體同故也自住平等法以此導眾生不違平等行故說常定者志念常堅固不忘菩提心亦能化眾生故說常定者常念於諸佛真實法性身遠離色身相故說常定者常修念於法如諸法實相亦無有憶念故說常定者常修念於僧僧即是無為離數及非數常入如是定註此禪度中文分兩段初聲聞辟支佛定二大乘常定常定復分為四初即自利二即利他三即自他兼舉四即觀念三寶禪定雖分大小同依精進出生二者竝舉意在擇大也悉見十方國一切群生類而於眼色中終不生二相諸佛所說法一切能聽受而於耳聲中亦不生二相能於一心中知諸眾生心自心及彼心此二不分別憶念過去世如恒河沙劫是先及是後亦復不分別能至無量土現諸神通力而於身心中無有疲倦想分別知諸法樂說辯無盡於無央數劫開示法性相註此由禪定故獲得六通也得天眼故能徹鑑群生得天耳故能具聞佛法得他心故知自他心得宿命故憶過去得神境故遊諸佛土得漏盡故開示法性是所謂靜極光通達也智慧度彼岸善解陰入界常為眾生說無取無戲論註凡夫由無智慧無明所覆于五陰六入十二處十八界妄生執著不能善解故沉生死菩薩善解陰等即是實性故度彼岸雖自度已收彼未度故為說法雖為說法于法相無所取善知陰等無性故所說真實離於戲論也善知因緣法遠離二邊相註此釋前偈既知陰等性無則亦無可說云何而為眾生說耶釋云陰等實是無性不可說以因緣故可說也以因緣法亦是無性遠離可說不可說故又善知陰入界等皆由因緣出生無有自性故離二邊知是煩惱因亦知是淨因註資始為因成業為緣然是二者互相生起煩惱因迷法性而起菩提亦因煩惱而顯故知互相由藉者皆一無性也信解因緣法則無諸邪見註信解因緣者中觀偈曰因緣所生法我說即是空亦名是假名亦名中道義若能如是信解則離邪見矣法皆屬因緣無有定根本註說有不有譚空不空故無根本可定矣我見與佛見空見生死見涅槃之見等皆無是諸見註此釋無根本可定之意也我見佛見等是名二見如是二見廣求諸見皆無根本可定也無量智慧光知諸法實相無暗無障礙是行菩薩道註由悟因緣諸見皆無根本則得于無量智慧知諸實相矣是乘名大乘不可思議乘悉容諸眾生猶不盡其量註結指如上六度是名大乘是不思議乘也一切諸乘中是乘為第一註諸乘即聲聞辟支佛菩薩佛乘也彼諸乘中皆入名言不無階級如是大度一一無相不可思議故為第一也如此大乘者能出生餘乘餘乘有限量不能受一切唯此無上乘能悉受眾生註此最上乘法以法界為體一切由此出生故曰無不從此法界流究竟還歸此法界若行此無量虗空之大乘於一切眾生無有慳悋心註此之大乘猶如虗空不礙萬像之所發揮也虗空無有量亦無有形色大乘亦如是無量無障礙註前以虗空之無礙用況大乘之無礙此以虗空之無形用況大乘之無形若一切眾生乘於此大乘當觀是乘相寬博多所容註此結歸無礙無形之意也無量無數劫說大乘功德及乘此乘者不可得窮盡註能乘之人所乘之法皆不可盡也若人聞此經乃至持一偈永脫於諸難得到安隱處註上則乘此脩行此則力未逮彼聞經隨喜少持一偈功德如是何況具足受持者乎敬念此經者捨是身已後終不墮惡道常生人天中於後惡世時若得聞是經我皆與受記究竟成佛道註是經者即是自心一切眾生迷背自心故流浪生死若聞自心諦信不疑則佛與受記也若持此經者佛法在是人是人在佛法亦能轉法輪註若信自心則佛法在是人所弘是人能荷擔佛法也若人持是經能轉無量劫生死諸往來得近於佛道註持是經者信慕大乘轉多劫為一念生死往來皆得近佛道矣若能持是經精進大智慧是名極勇猛能破魔軍眾註二乘亦稱精進然無道心不名勇猛菩薩一念信解便同正覺故言極勇猛矣我於燃燈佛住忍得受記若有樂是經我受記亦然註我于燃燈佛前解稱性大乘無法可得得受無生忍記我以是經與汝等說若能信樂受記如我無有異也若人於佛後能解說是經佛雖不在世為能作佛事佛說是偈時五千天子皆發阿耨多羅三藐三菩提心二千菩薩得無生法忍十千比丘不受諸法漏盡心得解脫三萬二千人遠塵離垢於諸法中得法眼淨發菩提心品第十八註前品志慕大乘獲益如是其如上說行人聞益發心理果然矣恐不知發無所發妄執有得有願墮落邪小不知所向故文殊欲使法眼清淨啟佛決擇也爾時文殊師利法王子白佛言世尊如我解佛所說義若有人發菩提願是為邪願所以者何諸有所得悉皆是邪若計得菩提而發願者是人諸所作行皆為是邪所以者何菩提不在欲界不在色界不在無色界菩提無有住處不應發願註菩提本是自心非是外物故無方所住處若發願求菩提者似慕其外矣何也有外可言有得若無外者不可言發願求菩提也世尊譬如有人願得虗空寧得空不佛言不也世尊菩薩亦復如是發同虗空相菩提之願即是發虗空願註辟如人身內外循體皆空不知是空反欲求空豈非妄乎菩提自心亦復如是見聞知覺無非自心捨是則求寧不為妄乎菩提出過三世非是受相不可願也註此釋發同虗空願之意也以虗空無相不屬三世菩提亦無相非已得非當得非今得欲何願乎以菩提非受相非受故非得也若菩薩起二相發菩提心作是念生死與菩提異邪見與菩提異涅槃與菩提異是則不行菩提道也註菩提云覺覺自心故若彼生死邪見等非自心者彼生死等應在自心之外矣若生死在自心之外則生死彼自生死于我何有而欲迯生死耶若生死等是自心不應起二見以心不取心心不捨心故也心不取捨則大小名相皆會歸一致矣爾時思益梵天謂文殊師利菩薩云何行名菩提行答言若菩薩行一切法而於法無所行是名菩提行所以者何出過一切所行是行菩提註前以菩提出過三世故不應發願求菩提此中以菩提不屬有為但可無所行而行也行一切法非如二乘執灰斷無所行則不如凡夫執有為行而無行無行而行非心識可議也又問云何出過一切所行是行菩提答言離眼耳鼻舌身意諸緣相是名出過一切所行註六根所緣無非妄境菩提即是實相離緣絕對故六根所不到六根不到則超諸行矣又問出過有何義答言不出過平等所以者何一切法平等即是菩提註所謂出過諸行者但過諸虗妄分別不出過平等以菩提性平等故梵天恐人不解菩提是平等無分別是特問其為義義性平等無過不過但不過平等而已又問云何是發菩提願答言當如菩提又問何為菩提答言菩提非過去非未來非現在是故菩薩應以三世清淨心發菩提願註前云菩提同于虗空出過三世不可願也梵天重問何為菩提似同不解者恐人不悟菩提即是自心故特問明而文殊乃答應以三世清淨心發菩提願始獲泮然也梵天如過去未來現在法從本已來常不生不生故不可說如是發願無所發願是發一切願所以者何以是行道能得薩婆若註前薩婆若品如來以五華布施則得具足六波羅蜜則能滿足薩婆若滿足薩婆若者眼不受色耳不受聲鼻不受香等是薩婆若滿足之義此中以三世清淨心了法無生是行薩婆若道前示根塵無生故菩薩由是受記此示三世平等非是受相菩薩發菩提心者當發其無所發之心也發其無所發之心當得薩婆若道前示圓滿之趣此示趍果之行故當前後合辯乃得了然也又問何故說言薩婆若答言悉知一切真智慧故名為薩婆若註薩婆若云覺圓滿一切覺道至此圓滿故能悉知如百川眾流至于大海乃名具足故又云薩婆若海又問何等是真智慧答言無變異相如眾生無變異相真智慧亦無變異相註如來權教權分九界生死迷悟今據一乘實教融彼九界同是一如無有生死迷悟譬如百川眾流依處得名江河淮濟等若歸大海眾號頓消均名海水無有變異相也又問云何是眾生相答言假名字畢竟離是眾生相如是無相則無變異若眾生與菩提異是為變異如菩提相眾生亦爾是故無變異註前云眾生無變異真智慧亦無變異此有二疑若謂眾生無變異則眾生是眾生佛是佛發心修道皆成唐棄安能轉凡成聖哉若謂有變異則一真法界之性同乎生滅故梵天重問何謂眾生相而文殊答曰假名字畢竟不可得是其相以假名字畢竟無體故何變異之有眾生相如鏡中像菩提相如水中月名字異者相異也無體之性未甞異也菩提不可以餘道得但以我平等故菩提平等眾生性無我故如是可得菩提是故菩提無有變異所以者何如虗空無變異相一切諸法亦無變異相註菩提不可以餘道得者但以平等自心證得也分別故名眾生平等故名菩提分別平等同依自心無別有體無別有體故但了性無我則證得菩提所謂二而無二故無變異同于虗空一切法亦然也爾時思益梵天謂文殊師利如來是實語者能說如是法文殊師利言如來於法無所說何以故如來尚不得諸法何況說法註如來有時說求菩提為是有時說求菩提為非有時說有眾生有時說非眾生如是等法曾無斷了非大菩薩不能諦信小乘聲聞多致狐疑豈如來真實之言能如是說邪文殊謂如來未嘗說法凡有所說無非應機逗教於如來何有則如來尚不見諸法何況有說邪思益言如來豈不分別諸法是世間是出世間是有為是無為耶文殊師利言於汝意云何是虗空可說可分別不思益言不也文殊師利言今說虗空名字以所說故有生有滅耶思益言不也文殊師利言如來說法亦復如是不以說故諸法有生有滅如此說法是不可說相亦以此法有所教誨是無所教誨所以者何如說法性不說法性亦如是是故說一切法住於如中如亦無所住註若如來不說法者如來豈不分別有為無為等邪而如來雖有分別分別即是無分別以法性不可得故猶如虗空不因說生為之生不因說滅為之滅而法性亦復如是故如來知是不可說而說知是不可說而說者說即是無說說是無說則亦無說而說無說而說為化眾生也為眾生而說者則說與無說皆不可得也爾時釋梵四天王俱在會中即以天華散於佛上而作自言世尊若善男子善女人聞文殊師利說法有信解者當知是人能破魔軍及餘怨敵所以者何文殊師利今所說法能破一切邪見妄想註諸天以華散佛者華表因也以此無願無求無得無說之為因能趣佛果故也無願故能破邪見無求故能破妄想破妄想故怨敵不能對破邪見故魔軍不得便是所謂稱性大乘世所希遇也世尊若善男子善女人聞於是法不驚不怖當知是人不從小功德來註上言所說法勝此言聽法行人亦非下聖法華云若人能竊為一人說一句是人則為如來所使亦此之謂也若是經所在之處當知此處則為諸佛擁護受用若聞是經處當知此處轉於法輪註是經所在則為諸佛護念者是經即是自心能知自心所在則佛為護念眾生不聞自心心外求故佛為說法令知所向故能聞自心則謂已轉法輪悟是自心即是諸佛說法能事以竟是經在所住處聚落村邑山林曠埜塔寺僧房經行之處諸魔外道貪著之人不能侵嬈註聚落村邑動處也山林曠埜靜處也塔乃高出二邊逈離動靜也寺及僧房乃容受之處也經行乃脩道之處也如是等處不昧自心則為所在自心不昧則彼天魔外道皆不得侵嬈矣世尊若人多供養過去諸佛乃能得聞如是經典註此結釋聞經之人不從小功德來之意也般若云後五百歲有能持戒脩福聞是章句信心清淨是人不于一佛二佛而種善根以于無量百千億諸佛所種諸善根世尊我等於此經中得智慧光明而不能得報佛及文殊師利思益梵天之恩註此經乃所聞之法智慧乃能悟之心也佛及文殊乃說法之主也梵天乃善解正問者也能悟由所聞而為之開發所聞由能說而為之引導能說由能問而為之發起四者相繼缺一不可也端本其源歸功于佛與文殊梵天我因得聞是法開悟自心其恩曷能報哉世尊我等所從聞經於是法師生世尊想註上云佛及文殊此中意云凡有法師能說是經我等得聞皆生世尊之想不致慢也我等常當隨侍說是經者此善男子常為諸天之所擁護若人書寫是經讀誦解說時無量諸天為聽法故來至其所爾時世尊語釋梵四天王等大眾言善哉善哉如汝所說若三千大千世界滿中珍寶以為一分聞是經者所得功德以為一分其福勝彼置是三千大千世界若恒河沙等十方世界滿中珍寶聞是經者所得功德復勝于彼註二施之中法施為上故前後疊喻世界珍寶不及聞經以彼布施不聞是經只成世間有為福報不及聞經無漏智種故永嘉云住相布施生天福猶如仰箭射虗空勢力盡箭還墜招得來生不如意曾似無為實相門一超直入如來地此上總彰聞經布施二分優劣下乃別列聞經獲利諸善男子若欲得功德者當聽是經註總列功德所由下乃別開功德名件欲得身色端正欲得財富註身色乃正報之本此經直指法身能聞此經則悟法身了知身色即非身色非色則端正斯在富乃依報之要此經顯揚藏祕能聞是經則悟藏心了知七功德財皆是我有皆我有故始名富饒欲得眷屬欲得自在註塵勞即吾眷屬皆名妙用皆名妙用則取捨斯忘取捨斯忘則縱橫自在欲得具足天樂人樂欲得名稱註大樂人樂非離心有能悟自心則名稱斯在欲得多聞憶念堅固正行威儀註若依文字多聞愽識有得有失不名堅固若依實相自性宗通何記何忘是名無漏了心無外則正行無差而威儀自若也戒定智慧註總六度為二門前五為福後一為慧福度以戒定為最故徧二端解達經書欲得善知識註前云多聞此云解達經書文似重疊上文應是總括世出世典此中應是獨尊大乘奧旨善知識者有二一者為知識所護前文云為善知識所護二者自為善知識前文云誰為眾生善知識欲得三明六通欲得一切善法註前則欲得其因此中欲得其果欲得阿耨多羅三藐三菩提註自利之益也欲得與一切眾生樂具註利他之德也欲得涅槃者當聽是經註總結自他二利所歸之趣除此實相自心別無有道也受持讀誦如法修行廣為人說諸善男子若行是經者我不見其人不得如是具足快樂註受而不失持而不忘下根之人不能如此則當讀誦使獲通利如法而行此蓋言由聽而解由解而行由行而證故言具足快樂必然之道也善男子我今語汝若人所從聞是經處若和尚若阿闍黎我不見世間供養之具能報其恩註下文釋成不能報所以謂也是法出過世間世間供養所不能報是法度於世間世間財物所不能報是法無染染汙之物所不能報註出過世間則有為不能及度世間則利欲不能干于是財物供養總名染汙非法相應故皆不能也諸善男子是法餘無能報唯有一事如說脩行若人於此法中能如說脩行者是名能報師恩亦為恭敬於師淨畢報恩是名不空食人信施註能報師恩善知本也不空食人福利他也蓋信施供養望我成道將利彼故是則名為順如來語順如來教是名越度眾流是名過諸險道註不聞實相心常為生死險道所陷若聞此經則險道斯度矣是名建立勝幢是名能破敵陣是名師子之王無所畏故註一切萬法至心而極若了此心則勝幢高豎破諸邪論怨敵猶師子之王無所恐怖矣是名象王心柔輭故註無畏乃破敵之威柔輭乃悅人之德是名牛王外道論師無能壞故註喻如牛王群牛畏伏故是名醫王能療一切病故是名無所驚怖能說甚深法故是名能具足捨捨諸煩惱故是名持清淨戒究盡善法故是名得大忍辱離我我所故是名大精進力於無量劫心無倦故是名具足禪定常念繫心住一處故是名有大智慧善解言說諸章句故註此舉依一心具足六波羅蜜也是名有大功德以無量福莊嚴身相故註達磨云功德在自性中求非外可得此經備宣自性故能聞能說者則有大功德莊嚴矣是名有大威德能蔽日月諸光明故註日惟照晝月惟照夜心光洞然照無不矚故日月有所未及也又餘經行人于有無二邊各就其長猶如日月各據晝夜此經純談實相餘方便教光為之隱蔽是知實相威德超諸方便矣是名大力持佛十力故是名大雲能震法雷故是名大雨滅煩惱塵故註如來十力二乘有所不堪惟實相相應故能持此實相之法慈悲普覆如雲驚悟群品如雷滅除煩惱如雨蓋由眾生迷此實相受諸熱惱行人若能持說自利利他何所不該矣是名為舍至涅槃故註眾生不聞實相以生死為宅一聞此經則離生死宅處涅槃舍矣是名大救救生死畏故註信方便教有無破蕩則取捨未忘于生死不為無畏故不名救此實相心中遠離戲論分別尚不得涅槃何生死可畏乎故曰大救是名燈明離無明暗故註乘智慧燈照明實相則無明自離矣是名歸趣魔所怖者之所依故註眾生怖躡魔冤者由未聞如是經也而持經者與說實相則魔冤不復怖故是所歸之趣矣是名眾生究竟之道註一切眾生究竟歸于實相故是名得位坐道場故註如來不得一法而坐道場行人能持是經亦不得一法故即名得位是名已得法眼是名見諸法如是名知空法相故註得法眼者以實相不礙鑒俗也見諸法如者以實相不礙證真也知空法相者了此二邊皆入中道第一義空也是名安住大悲是名安立大慈是名不捨一切眾生註行人持此實相之經則妙含三德三德既具則運平等大悲拔眾生之苦興無緣大慈與眾生之樂慈悲既備則不捨一切眾生矣是名背於小乘是名向於大乘是名除捨顛倒是名至於平等是名入於法位註未達實相則法法成差若悟實相則法住法位矣是名安住道場是名破壞諸魔是名轉於法輪諸善男子我若一劫若減一劫稱揚讚嘆說是如說修行功德不能窮盡如來之辯亦不可盡註蓋實相無相故持經者功德不可盡如來讚辭亦不可盡皆稱實相故也爾時會中有天子名不退轉白佛言世尊所說隨法行隨法行者為何謂耶佛告天子隨法行者不行一切法是名隨法行所以者何若不行諸法則不分別是正是邪如是行者不行善不行不善不行有漏不行無漏不行世間不行出世間不行有為不行無為不行生死不行涅槃是名隨法行註前文殊謂發願求菩提是名邪願不知是諸法平等平等即是實相悟此實相即得菩提菩提云覺覺法平等故覺法平等則諸法無非實相皆實相者則離揀擇離揀擇則隨所行法皆稱實相隨所行法皆稱實相則于菩提無有退轉故天子名曰不退轉即諸法實相之象也由達諸法皆實相故不分別正邪善惡乃至世出世間有為無為以其不分別故隨其行皆稱菩提故曰無往而不自得也儒云在天而天在人而人百姓日用而不知良可悲夫若起法相者是則不名隨法行也註上則不分別法隨其所行皆稱菩提此中出過云若起法相則凡有所行皆不得名為隨順法行故曰法本無好醜好醜起于心我信之矣若念言我行是法是則戲論不隨法行註法無方所亦無名狀若言有可行者故名戲論若不受一切法則隨法行於一切法無憶念無分別無所行是名隨法行註無憶念則世性本空無分別則戲論斯遠無所行則有為斯盡如是而行何退轉之有也爾時不退轉天子白佛言世尊若能如是隨法行者是人畢竟不復邪行所以者何正行者名為畢竟住邪道者無隨法行住正道者有隨法行世尊行正行者無所邪法所以者何諸法平等無差別故註釋成邪道無隨法行正道有隨法行之意也既云隨法而行則隨邪則邪隨正則正何故邪無正有邪以邪道行者隨戲論分別故無隨法行也正道行者隨順諸法平等無有分別故有隨法行也爾時思益梵天謂不退轉天子汝於此中隨法行不註所言隨法行者隨其正性而行無有能行所行若著能所則不得名為隨法行也故梵天恐人隨于能所故致斯問答言若世尊所說法中有二相者我當行隨法行今以無二相是隨法行於中行者及所行法俱不可得註無二相者無能所二相也若云我行隨法行者即墮能所能所之法佛所不說以佛不說有能所故能行之行所行之法悉不可得故我不見有行隨法行者安有能所哉梵天我以不二法行隨法行離諸分別故如諸法如行是名隨法行註一切諸法皆如相隨其如相而行離諸分別是名行也思益言汝未曾見此佛土耶天子言此佛土亦未曾見我註梵天意曰若無分別隨法而行者寧不見此佛土耶若見佛土則能所顯然乃得云無分別乎天子曰佛土亦不見我我不見佛土者心外無法故佛土不見我者法住法位故思益言此佛土不能思惟分別見與不見天子言我亦不思惟分別曾於佛土見與不見註若佛土無分別不能見我我亦無分別不見佛土是所謂各各不相知各各不相到楞嚴云汝今諦觀法法何狀意同思益言何人未見能見天子言一切凡夫未見聖法位若能入者是為先所未見而見註下釋成未見能見之意是法位相非眼所見非耳鼻舌身意識所知但應隨如相見如眼如乃至意如法位如亦如是若能如是見者是名正見註未見法位則起分別若入法位則分別不生分別不生故六根如六根如故六塵如六塵如故六識如根塵識如即知法位如知法位如即是先所未見而今能見也能見是法位性本如是則于菩提心無有已發無有當發無有今發了知發無可發是真發菩提心也

body:
  text: 姚秦三藏法師鳩摩羅什奉詔譯明會稽顯聖寺後學沙門圓澄注右春坊右庶子南充黃輝左春坊左諭德會稽陶望齡全校左春坊左中允太原傅新德訂正注凡經題或人或法或單或兼此經人法兼舉之類歟問主名思益梵天者思乃三慧之一門梵者淨也天者主也以淨為主以思為助益彼修證所謂學不加思無由契入者矣梵天乃能問之主絶待一心乃所詮之法能所合稱故云梵天所問經者道也條貫通途使行人有所進修也如來光明品第一注首品名如來光明者宜不言而自喻矣以光無言説舉目了然古云未開口以前略較些子如是我聞一時佛在王舍城迦蘭陀竹林注如是乃指法之辭我聞明法有所受然則法分五教説有五時要見此經在何時被何教邪準賢首所判第四頓教大乘所收在方等之時迦蘭陀竹林我于佛所聞如是深經也與大比丘僧六萬四千人俱注比丘此云無翻因果各具三名難以具譯故云無翻菩薩摩訶薩七萬二千人皆衆所知識注名聞廣遠為衆所知得陀羅尼注此云總持無礙辨才注四無礙辨也及諸三昧注此云正見舊云正受圓覺云三昧及正受明非正受也不見曰昧於無見處與正理相應是謂正見於諸神通無所罣礙注神通有六諸者兼舉之謂也善了諸法實性注所解之法也悉皆逮得無生法忍注所詣之果也蓋由思而解由解而修由修而證既證已所謂總持神通三昧辨才悉皆獲得為衆識知也前則總嘆衆德下乃例名其名曰文殊師利法王子寶手法王子寶積法王子寶印手法王子寶德法王子虗空藏法王子發心轉法輪法王子網明法王子障諸煩惱法王子能捨一切法王子德藏法王子華嚴法王子師子法王子月光法王子尊意法王子善莊嚴法王子注此中十六法王子開一心為八識在纏名識出纏名智因果往返一十六心此心堪紹佛位故云法王子法華經智勝如來十六王子捨家修道亦以八識為表彼由俗趍真惟云王子此即真即俗故云法王子因果同時圓會一心所以為頓教也若以德立名則不無別表以義推之自可解了矣及跋陀婆羅等十六賢士注前十六法王子則顯因果同時此十六賢士則表聖賢同位也跋陀婆羅菩薩寶積菩薩星德菩薩帝天菩薩水天菩薩善力菩薩大意菩薩殊勝意菩薩增意菩薩善發意菩薩不虗見菩薩不休息菩薩不少意菩薩導師菩薩日藏菩薩持地菩薩如是等菩薩摩訶薩七萬二千人注前則正舉當機此則伴舉聽衆及四天王釋提桓因等注此則總舉下乃別列不爾下云忉利天等有重疊之過忉利諸天注此天都轄三十三天故總別兼舉也夜摩天兜率陀天化樂天他化自在天注此盡欲界天也及梵王等諸梵天注此乃色界十八梵天不舉無色界者以彼天根鈍頓教門中非所預也并餘無量諸天龍鬼神夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人與非人普皆來集注經分三分序分齊此下乃正宗分也爾時世尊大衆恭敬圍繞而為説法於是網明菩薩注此菩薩號網明者直顯真心生佛本具凡聖互容猶如帝網之明大小相收本來如是非假強為下文菩薩光明品中具彰此義即從座起偏袒右肩右膝著地頭面禮佛足合掌向佛動此三千大千世界引導起發一切大衆而白佛言世尊我欲從佛少有所問若佛聽者乃敢𧫎請佛告網明恣汝所問當為解説悅可爾心於是網明既蒙聽許心大歡喜即白佛言世尊如來身相超百千萬日月光明我自惟念若有衆生能見佛身甚為希有注如來身相超百千萬日月光明其明白顯露如是宜乎人人皆見而云見者希有應知自性法身非形色可見也于我本具靈明無差所謂日月不足喻其明也良由衆生無明妄隔不能自見耳能見之者無明輕薄甚為希有華嚴云奇哉衆生皆有如來智慧德相良由妄想執著不能證得此之謂也我復惟念若有衆生能見佛身皆是如來威神之力注譬如虗空正體無形而能妙含萬有苟非日月威光顯發一切衆生不能得見虗空德相能見之者皆日月威神之力也此亦如是佛告網明如是如是如汝所言若佛不加威神衆生無有能見佛身亦無能問注華嚴云我當為轉法輪令得開悟此中所加有三一曰身加如放光顯發等二曰口加如開示悟入等三曰意加陰發神識善解問難等雖然如此不可推在他佛身上祇是自心運轉施為皆仗渠力若作他解是名邪觀也網明當知如來有光名寂莊嚴若有衆生遇斯光者能見佛身不壞眼根注佛身須佛眼所見非肉眼能見光名寂莊嚴者即眼之實性能達眼之實性則不壞肉眼之根而見佛身宜矣前則如來所加能見佛身此下釋如來所加善解問難又如來光名無畏辨若有衆生遇斯光者能問如來其辨無盡注達法實性故得無畏以無畏故能種種幻興問辨無盡也此乃總標能問之意下即別開善問所由又如來光名集諸善根若有衆生遇斯光者能問如來轉輪聖王行業因緣注輪王以十善為因施度為緣因即行也緣即業也故光名集善根下文倣此又如來光名淨莊嚴若有衆生遇斯光者能問如來天帝釋行業因緣注大般若云若人修百無遮大會乃作帝釋天主故光名淨莊嚴行業可信也又如來光名得自在若有衆生遇斯光者能問如來梵天王行業因緣注一切衆生皆為五欲所縛不得自在此天行業在離欲修禪故遇如來自在光明乃能發起前云輪王行業則兼舉人類次云帝釋行業則兼舉六天此中梵王行業則兼舉四禪不舉無色界者非此經之機也又如來光名離煩惱若有衆生遇斯光者能問如來聲聞乘所行之道注四諦之法善離煩惱故衆生遇之發起聲聞之道也又如來光名善遠離若有衆生遇斯光者能問如來辟支佛所行之道注十二因緣之法善能遠離生死喧闠蓋辟支佛以修還滅十二因緣也若流轉十二因緣乃衆生同業生死之相不名善遠離矣然辟支有二種一曰緣覺又名部黨以有師徒黨類傳習修行者也二曰獨覺又曰麟出無佛世無師自悟者也又如來光名益一切智若有衆生遇斯光者能問如來大乘佛事注前凡界中但云因緣不云道非出生死之要也聲聞辟支雖云道而不云大乘佛事者以彼惟自利而不能利他也菩薩人已兼利堪起佛乘故光名益一切智而問大乘佛事矣此中總明如來威神加被能解問難問中三凡三聖于十法界中不問四惡處何也以四惡處非行人修進之途故不問也以此為自利之門若利他門下文當備六根之中如來惟加眼舌二根餘四不加何也舉其總故眼見如來身起欽承口問法義耳聽玄音意擇是非所謂舉一隅不以三隅反若以稱性門中則六根皆被如來之力當知眼如是見耳如是聞口如是談論乃至意如是思惟莫不皆仗這個威力故傅大士云欲識佛去處只這語言是故知如來加被者乃稱性之法也又如來光名曰往益佛來去時足下光明衆生遇者命終生天注前彰自利門如來威加能發辨問以無畏辨光為總後六問為別此彰利他門故光名往益惟此為總下乃別開隨時隨機光有異名會而歸之同名往益又如來光名一切莊嚴若佛入城放斯光明衆生遇者得歡喜樂一切莊飾之具莊嚴其城城中寶藏從地湧出注福德之光又如來光名曰震動佛以此光能動無量無邊世界注威神之光二者世界悉檀也又如來光名曰生樂佛以此光能滅地獄衆生苦惱注悲光也悲能拔苦苦拔則樂生矣又如來光名曰上慈佛以此光能令畜生不相惱害注平等慈光也平等故冤親等觀不相惱害又如來光名曰涼樂佛以此光能滅餓鬼飢渴熱惱注餓鬼以慳貪為負吝報飢渴貪受熱惱今遇如來無我之光則悔悟吝貪為過頓生涼樂消熱惱曰涼除飢渴曰樂此中三惡道兼前六問共成九法界惟缺修羅文略耳又如來光名曰明淨佛以此光使盲者得視注若有見則有不見有無相傾則成汙濁惟盲者無見則無有不見能所既離是名明淨然則不蒙如來法光所照不能自知無見為真見故曰盲者又如來光名曰聰聽佛以此光能令衆生聾者得聽注前則無見為明淨此則無聞為聰聽義可推之又如來光名曰慚愧佛以此光能令衆生狂者得正注衆生由無慚愧狂亂顛倒苟能一念知慚識愧則狂亂除而正見現前此於六根中惟舉眼耳意三不舉鼻舌身三何也蓋由眼等三根取境利故鼻等三根取境鈍故取境利者常與識心相應故曰盲曰聾曰狂若不得如來正觀威力加被則不能視不能聽不能正故特舉之取境鈍者常與法性相應全體如故不必更加也此上舉為人悉壇又如來光名曰止息佛以此光能令衆生捨十不善道安住十善道注身業殺盜淫口業惡口兩舌妄言綺語意貪嗔癡共名十惡遇如來光捨於不善而行善也又如來光名曰離惡佛以此光能令邪見衆生皆得正見注前則遇光修止此則遇光修觀止為入善之初門觀為破邪之勇敵故粗業用止細業用觀皆前後相須也夫捨其不善而行其善似墮二見成敵兩立是名惡見亦名邪見細而觀之若惡是實不能轉惡以成善若善是實不能迷善以就惡以惡無性故遷惡以從善以善無性故背善而從惡苟能知此無性則取捨二見遠離是名正見問如來放光衆生遇者頓然獲益非同造次子云修止修觀似是有為恐非佛意耳答云前文云如來若不加被衆生無能見佛亦不能問既云如來加被而衆生能見能問亦云如來加被而衆生能修能行於理不違蓋由如來光明照明衆生心地使之自解活計現前隨機獲益譬如日光出時而百姓各各辨事非謂日光有所與也又問如來光明是一何以衆生遇之獲益不同答云法華經如來放眉間白毫相光照東方萬八千佛土下至阿毗上至有頂於中六道衆生生死往還受報好醜乃至菩薩修行相貌成道涅槃彌勒皆于光中了然明覩彼云明見差別此云隨機獲益二文合看疑可泮然要而言之凡所説法總名法光明也又彌勒一生菩薩故能圓見差別于一毫光中三乘人力不逮此但隨分見耳又如來光名曰能捨佛以此光能破衆生慳貪之心令行布施又如來光名無惱熱佛以此光能令毀禁衆生皆得持戒又如來光名曰安利佛以此光能令嗔恨衆生皆行忍辱又如來光名曰勤修佛以此光能令懈怠衆生皆行精進又如來光名曰一心佛以此光能令妄念衆生皆得禪定又如來光名曰能解佛以此光能令愚癡衆生皆得智慧注六根因如來光明所加故能視能聽及能正見由正見故能修止觀修正觀故進趣六度異前聲聞辟支也又如來光名曰清淨佛以此光能令不信衆生皆得淨信注衆生封于無明著于人我於此大乘不能生於淨信為煩惱所汙故也何為淨信何為不淨信邪凡夫信于有為外道信于斷常二乘信于偏空權乘信於事度是皆著于有為總名不淨之信若信自心本來圓淨非空非有無得無證性真如是不屬修為是名淨信又如來光名曰能持佛以此光能令少聞衆生皆得多聞注衆生不達一心循行數墨學日繁而性日拙故曰少聞若能了悟自心則知萬法於吾無所不備始號多聞如世尊自號多聞藏等又如來光名曰威儀佛以此光能令無慚衆生皆得慚愧注衆生由無慚愧故狂亂放逸慚者慚人愧者愧己慚人有德而我不逮愧己有失而我不改如是自悛則威儀備具得慚愧矣又如來光名曰安隱佛以此光能令多欲衆生斷除淫欲注衆生為貪欲所牽多致險害陷入惡道故古人以刀上之蜜華下之蛇喻其為害非細苟能離欲除貪自然心身安隱又如來光名曰歡喜佛以此光能令多怒衆生斷除嗔恚注衆生迷于自心不覺轉似外境妄立我人妄起是非妄生鬪訟故生嗔怒若悟自心則前塵不有人我既虗則是非不實內外性如則敵對不成契心平等則轉瞋成喜又如來光名曰照明佛以此光能令多癡衆生斷除愚癡注衆生迷于無明似處長夜一無辨白號曰愚癡若能一念照明能使轉愚成智然六道于無明全具四聖于無明分具聲聞秪破界內見惑界外思惑全不知故辟支分破一分菩薩修一分三德破一分無明直至妙覺乃明全破今此遇光成智應是初心以此經為頓教頓同妙覺故所謂初心畢竟二不別如是二心初心難難得其旨悟者知妙又如來光名曰遍行佛以此光能令等分衆生斷除等分注如來八萬行門無非應機之用衆生不悟偏守己見而各相是非權實若融則偏計斯忘圓修梵行故斷等分此上即對治悉壇也又如來光名曰一切色佛以此光能令衆生皆見佛身無量種色注此第一義悉壇也前對治為因此中為果由因中遍行梵行果上圓現色身能使衆生隨時隨機見無量種色法爾如是總論此中光明始分二門初自利門中二初總舉能見能問次則於能問別開六問以彰行人進修之益二於利他門中二初總舉往益次則四悉壇開示四初嚴城動地為世界悉壇二拔三塗苦使盲者得視聾者得聞狂者得正是為人悉壇既見且聞故則修于對治何名對治散者修止昏者修觀慳者行施犯者持戒嗔者修忍怠者修進亂者修定愚者修智六度既具然後發大乘淨信既信矣棄小乘得少之執慕大乘多聞之藏既多聞博識則慚愧往失而仰佛威儀仰佛威儀則斷有得貪欲棄取捨嗔恚離所知癡愚絶等分執著而圓修梵行是名對治悉壇此中圓現色身即第一義悉壇也問曰佛光普照令盲者得視聾者得聞乃至不信者令信而如來會下同稟異聞有信有不信有得有不得為復如來光有親疏為復經不足信耶答曰如來大法光明若大圓鏡來者皆覩所謂衣亂者整之冠倒者正之面有油墨者拭之然有見而不屆意者以謂鏡中之像非是我身不之整拭是誰過歟行人聞佛法光明門以謂聖賢之事於我絶分不即修治亦由是矣古云大凡看教須宛轉消歸自己勿認外緣故經云如來者即諸法如義網明當知如來若以一劫若減一劫説此光明力用名號不可窮盡注劫者時也有大劫有中劫有小劫人壽十歲為期過一百年增一歲增至八萬四千歲過一百年減一歲減至十歲如是一增一減名為一小劫如是二十小劫名為中劫如是四中劫名為大劫此中以增減為論者即是小劫也經劫讚嘆不能盡者益見其勝也爾時網明菩薩白佛言未曾有也世尊如來身者即是無量光明之藏説法方便亦不可思議注此則結嘆不可思議下乃述歸自心世尊我自昔來未曾聞此光明名號注昔者指阿含之時也如我解佛所説義若有菩薩聞斯光明名號信心清淨皆得如是光明之身注可謂宛轉消歸自己也世尊唯願今日放請菩薩光令他方菩薩善能問難者見斯光已發心來此娑婆世界注前則如來自説光明名號力用者彰本有之光而人人皆具故網明當其機也今叩如來放請菩薩光者方便光也故菩薩由他方來者矣以實際之中無問答故前云能見能問皆如來加被者以方便依實際故所言方便者思益梵天當其機惟聞思修皆方便故爾時世尊受網明菩薩請已即放光明照此三千大千世界普及十方無量佛土於是諸方無量百千萬億菩薩見斯光已皆來至此娑婆世界時東方過七十二恆河沙佛土有國名清潔注初舉十方而次舉東方東者東為群動之首萬物發生過恆河沙佛土者極其群動之際也極群動之際則見實相見實相則離二邊垢濁故國名清潔佛號日月光如來應正遍知今現在注以如幻智雙照二邊如日月光無所不矚此佛亦是方便智故云現在以方便無性不屬過去未來故其佛土有菩薩梵天注菩薩又曰梵天者表俗諦也從日月光佛土來者俗諦依方便智之所出也名曰思益注此天以思益名者即思慧故思以梵天為名梵者淨也思與淨相應則趣聖道思與不淨相應則趣凡界也住不退轉注惟思為益故不退轉見此光已到日月光佛所注方便行為方便光所召詣方便智也頭面作禮白佛言世尊我欲詣娑婆世界釋迦牟尼佛所奉覲供養親近𧫎受彼佛亦復欲見我等注彼此皆在第二義門唱和也其佛告言便往梵天今正是時彼娑婆國有若干千億諸菩薩集汝應以十法遊于彼土何等為十於毀於譽心無增減聞善聞惡心無分別于諸愚智等以悲心於上中下衆生之類意常平等于輕毀供養心無有二於他闕失莫見其過見種種乘皆是一乘聞三惡道亦勿驚畏於諸菩薩生如來想佛出五濁世生希有想梵天汝當以此十法遊彼世界注日月光佛誨以十法行儀者即世諦而示實相也下文多方問辨皆不害此思益梵天白佛言世尊我不敢于如來前作師子吼我所能行佛自知之今當以此十法遊彼世界一心修行爾時日月光佛國有諸菩薩白佛言世尊我得大利不生如是惡衆生中注因聞十法勸行則知娑婆穢濁難堪各生自慶其佛告言善男子勿作是語所以者何若菩薩於此國中百千萬劫淨修梵行不如彼土從旦至食無嗔礙心其福為勝注淨明經云此娑婆世界有十未曾有難得之法此世界有餘世界無所謂布施度慳貪等是以此世界修行一日比餘世界百千萬劫時有萬二千菩薩與思益梵天俱共發來而作自言我等亦欲以此十法遊彼世界見釋迦牟尼佛注聞佛贊勝故欲共來矣於是思益梵天與萬二千菩薩俱於彼佛土忽然不現譬如壯士屈伸臂頃到娑婆世界釋迦牟尼佛所却住一面注屈伸臂頃則時分不收忽然而到則彼此不隔以不來相而來不至相而至可謂方便實際不較多矣爾時佛告網明菩薩汝見是思益梵天不唯然已見注前網明欲請他方善問難者見光來集而世尊名告見不此是善問難之人也下釋成網明當知思益梵天于諸正問菩薩中為最第一注揀異聲聞於諸善分別諸法菩薩中為最第一於諸説隨宜經意菩薩中為最第一於諸慈心菩薩中為最第一於諸悲心菩薩中為最第一於諸喜心菩薩中為最第一於諸捨心菩薩中為最第一於諸軟語菩薩中為最第一於諸不瞋癡菩薩中為最第一於先意問訊菩薩中為最第一於諸決疑菩薩中為最第一注此中十一種第一初則正酬善問難意次則別開十種為最用酬彼佛十法所訓也大意則由善正問故能善分別由善分別則善解隨宜所説解隨宜所説則起慈心與衆生之樂欲與衆生之樂在拔衆生之苦以四無量而導達之欲導達之以軟語而勸勉之欲勸勉衆生彼有難問不生嗔想有所未至不相自瞞則先意問訊而求擇之既擇矣于諸疑中得決然無惑矣此皆思慧之德也爾時思益梵天與萬二千菩薩俱頭面禮佛足右繞三匝合掌向佛以偈讚曰世尊大名稱普聞於十方所在諸如來無不稱嘆者注釋迦洪名萬德非唯三乘聞重亦為諸佛所嘆有諸餘淨土無三惡道名捨如是淨土慈悲故生此注此頌釋成諸佛所嘆之意捨彼淨妙出生五濁甚難佛智無減少注此釋前頌恐衆生作二見故有淨土可捨有穢土可生而不知佛土常淨衆生無明見穢佛智何增減哉與諸如來等以大悲本願處斯穢惡土注凡諸佛出生穢土一皆以大悲本願示處惡土也若人於淨國持戒滿一劫此土須臾間行慈為最勝注重釋前意諸佛何故以本願處斯惡土蓋由功超勝故淨國一劫持戒不若此土須臾行慈其功勝彼為最若人於此土起身口意罪應墮三惡道現世受得除生此土菩薩不應懷憂怖設有惡道罪頭痛即得除注重伸前意既淨國惡土其功日劫相勝不應別求淨妙而厭此穢惡也或有疑云諸佛神力示生可也我等無明力大智慧力微非惟不能度生行道反起身口之罪恐墮三塗釋云亦能現世除得而不必生憂也何以現世得除邪釋云設有其罪頭痛得除昔者戒賢法師忽染頭痛意求自盡彌勒降語云汝勿求死以汝三世為王殺人過甚冤對所尋應墮惡道汝今修道頭痛乃除次日果愈此土諸菩薩若能守護法世世所生處不失於正念注聞前功勝即欲處此修行所有惡業現世得除可也倘或不除後陰所昧失于正念將如之何釋云不患陰昧但患不能護法耳若能護法不但後陰世世生生不失正念也所言法者即是自心以此心微妙一切名相不能及也衆生不能了悟自心雖云修行實增忘染苟能妙悟常加護惜何患有失也古云大事未明如喪考妣大事已明如喪考妣亦此意也若人欲斷縛滅煩惱業罪於此土護法增益一切智注疑云守護自心則不失正念可矣若不斷除煩惱何由解縛而增長一切智邪釋云汝但護自心則煩惱不斷而自斷智慧不增而自增矣淨土多億劫受持法解説於此娑婆界從旦至食勝注上云淨國惡土持戒行慈日劫相倍此釋淨國惡土説法日劫相倍也我見喜樂國及見安樂土此中無苦惱亦無苦惱名於彼作功德未足以為奇注此重釋淨土修行未足為奇也於此煩惱處能忍不可事亦教他此法其福為最勝注重釋此土行道説法功勝餘土觀此贊頌一皆以長行中日月光佛前有諸菩薩自慶不生惡衆生中而來雖云稱讚釋迦其實警彼懈怠菩薩欣生淨土者之所説也我禮無上尊大悲救苦者能為惡衆生説法甚為難注結讚釋迦也佛集無量衆十方世界中名聞諸菩薩聽法無厭足佛集十方界名聞諸菩薩聽法無厭足注一世界為主十方世界為伴而彼十方世界一一各具十方世界極言其衆之多也如海吞衆流注釋名稱普聞菩薩有大智慧能受佛法如海之吞流也為如是人等廣説於佛道注如來示生惡土而集十方世界菩薩者彼此莫二之旨也為如是大根説法者機堪聞法也釋梵四天王諸天龍神等皆集欲求法隨所信樂説比丘比丘尼及清信士女是四衆普集願時為演説注是諸天龍四衆各有所樂佛當知其深心而悉為斷疑勿使偏棄也有樂佛乘者及緣覺聲聞佛知其深心悉皆為斷疑注前為大根所請此為三乘所請不斷佛種者能出生三寶注總結前來大小二機雖則趣向不同亦能使佛種不斷而出生三寶為是諸菩薩我今請法王注雖則三乘信樂不同其實同是菩薩故我勸請法王説法也名稱普流布十方菩薩聞皆悉共來集為説無上道注無上大法世尊久祕不談恐二乘驚怖故梵天所請非惟現前有堪大化者此大法之名流布十方彼菩薩聞皆來聽受故我勸請為説大法也此無上大法二乘所不及注此出故也梵天再三叩請恐四衆有疑世尊吝法故釋云非為吝法此法實二乘所不能喻也我等信力故得入如是法注非惟二乘我等尚非智分但可以信得入耳不可思議慧非我等所及佛雖無疲倦我今有所請悔過於世尊願説菩薩道注此梵天自謙之辭也意謂我等誠知非分而干惱世尊佛雖無倦我當悔過願説大法矣四法品第二注首標光明品者以光無言説問答無門中間但説光明名號而不放相好則朕狀絶迹故云般若如大火聚四面不可入也然由佛威加被而能見能問如是則無見而又能見無問而又能問不涉二邊不滯中流此四法之品來有源矣故云般若如清涼池四面皆可入也爾時思益梵天説此偈已白佛言世尊何謂菩薩其心堅固而無疲倦何謂菩薩所言決定而不中悔何謂菩薩增長善根何謂菩薩無所恐畏威儀不轉注不轉謂遇逆意之境而威儀自在不被前塵所動也何謂菩薩成就白法何謂菩薩善知從一地至一地注自堅固其心而至成就自法問因行也從一地至一地問果位也善知因行則無濫修之失善知果位則無上慢之愆以上六問皆自利門何謂菩薩於衆生中善知方便何謂菩薩善化衆生注此二問利他之行何謂菩薩世世不失菩提之心何謂菩薩能一其心而無雜行何謂菩薩善求法寶何謂菩薩善出毀禁之罪何謂菩薩善障煩惱何謂菩薩善入諸大衆何謂菩薩善開法施何謂菩薩得先因力不失善根何謂菩薩不由他教而能自行六波羅蜜何謂菩薩能轉捨禪定還生欲界何謂菩薩於諸佛法得不退轉何謂菩薩不斷佛種注此上十二問自他雙叩以為經遠之要非大菩薩不能問也爾時世尊讚思益梵天善哉善哉能問如來如此之事汝今諦聽善思念之唯然世尊願樂欲聞佛告思益梵天菩薩有四法堅固其心而不疲倦注前梵天總伸問意此下世尊開張欵釋可謂慈悲之至矣何等為四注徵釋其辭也下倣此一者於諸衆生起大悲心注見衆生苦惱思有所濟故發大悲二者精進不懈注濟人無先利己利己之要無越精進修道若不精進悲願徒然三者信解生死如夢注若謂生死實有可脫發心精進則成妄想非精進矣若解生死如夢而不廢修行是真精進也四者正思惟佛之智慧注前三為別為助此一為總為正不爾則三乘外道亦有悲等但不能正思佛慧多成退失若能思惟佛慧則其心堅固而無退矣菩薩有此四法堅固其心而不疲倦注結梵天菩薩有四法所言決定而不中悔何等為四一者決定説諸法無我注諸法者即陰入界等以及世出世間菩提涅槃等法也若言有我則何者是我推我本無則所言決定二者決定説諸生處無可樂者注若法有我則有生處可樂推之無我則決定無生處可樂三者決定常讚大乘注若執定無我無生處猶墮疑惑落二乘道須知諸法無我而無不是我諸法無生而無有不生始稱大乘圓融實相無諸疑惑得決定説四者決定説罪福業不失是為四注淨名經云無作無造無受者善惡之業亦不亡可謂決定之説矣梵天菩薩有四法增長善根何等為四一者持戒二者多聞三者布施注戒能生定多聞生慧定收五度慧具一門五度增福一門增智智具施法福具施財故定慧之後繼之布施所言布施者捨諸所有經云不著聲香味觸等施也四者出家是為四注出家有三初出世俗家如現前四衆等二出三界家如聲聞辟支等三出無明家如佛及菩薩等初則勸修定慧定慧具已勸行布施布施則捨諸所有捨諸所有則一切不著一切不著是謂出家如是出家則能增長善根矣梵天菩薩有四法無所恐畏威儀不轉何等為四一者失利二者惡名三者毀辱四者苦惱是為四注是四者皆逆意之境行人易動其心易生恐畏若失利不足憂惡名不足患毀辱不足耻苦惱不為逼處逆不生恐畏則處順不為動轉而威儀常自若矣梵天菩薩有四法成就白法何等為四一者教人令信罪福二者布施不求果報三者守護正法四者以智慧教諸菩薩是為四注信罪福則妙道可期求果報則有為自負護正法則魔外不干教菩薩則佛慧漸開初則教人信罪福終則以慧教菩薩二教雖分終始同期佛慧利人之道也二則施不求報三則守護正法二行雖例後先共向佛乘利己之事也梵天菩薩有四法善知從一地至一地何等為四一者久植善根二者離諸過咎三者善知方便回向四者勤行精進是為四注過去之因也若無往因則發心不易乃至多障多惱過去既有善根現前當離過咎以培植之雖云培植修進須知方便回向不著己求若著己求則成妄謬雖云不著己求亦勿撥棄而壞進修若撥棄不修安能從一地至一地乎此上六章次第生起初由堅固其心心堅固則所言決定所言決定則增長善根善根增長則不為順逆所動不為順逆所動則能成就白法白法成就則能從一地至一地以因趣果自利備矣梵天菩薩有四法於衆生中善知方便何等為四一者順衆生意二者於他功德起隨喜心三者悔過除罪四者勸請諸佛是為四注善巧逗會不逆其機隨喜稱嘆令他增進悔罪則黑業潛消請佛則法燈不滅實際中本無四事化衆生邊不失方便耳梵天菩薩有四法善化衆生何等為四一者常求利益衆生注欲化衆生當觀衆生如一子想觀衆生如一子常思所以利益之矣二者自捨己樂注所以利益當自捨己樂然後令彼樂學蓋衆生為樂所盲故如世尊捨家修道等三者心和忍辱注心和則共住無諍忍辱則怠慢不報四者除捨憍慢是為四注捨憍慢則學者愛親此四者皆化衆生之事也梵天菩薩有四法世世不失菩提之心何等為四一者常憶念佛二者所作功德常為菩提三者親近善知識四者稱揚大乘是為四注念佛則照覺不昧為菩提則修進不差親知識則受誨無厭稱大乘則不謀小道何失焉梵天菩薩有四法能一其心而無雜行何等為四一者離聲聞心二者離辟支佛心三者求法無厭四者如所聞法廣為人説是為四注不受有餘涅槃不美孤調解脫所謂如海吞衆流者如所聞而説則自行化他曾無二道其心常一前三乃自一其心後一乃化人一心也梵天菩薩有四法善求法寶何等為四一者於諸法中生寶想以難得故注所謂于無量劫未曾得聞如是之法是謂難得常提賣心藥王然臂大士全身輪王當座如是求法皆生寶想二者于諸法中生藥想療衆病故注八萬四千塵勞之病惟法為療故三者于諸法中生財利想以不失故注世間財利得而易失法寶財利採入藏識永劫無窮古云學道要須求悟資生要須求富學道若學資生個個成佛作祖四者於諸法中生滅苦想至涅槃故是為四注衆生為八苦所煎長淪生死惟佛妙法名為能滅至涅槃故梵天菩薩有四法善出毀禁之罪何等為四一者得無生法忍以諸法無來故二者得無滅法忍以諸法無去故三者得因緣忍知諸法因緣生故四者得無住忍無異心相續故是為四注諸法無所從來去無所至則知皆因緣生緣生幻合則得無住無住者不住過去不住未來不住現在不住內不住外不住中間三世性空內外無得誰是持戒誰是毀禁如是了達則能善出其罪也梵天菩薩有四法善障煩惱何等為四一者正憶念二者障諸根三者得善法力四者獨處遠離是為四注煩惱起于邪心憶正則邪不起邪不起則煩惱不生矣煩惱雖起邪念實由六根妄緣六根障止則外絶攀緣則當處湛然障絶煩惱所謂根既不緣塵何形相此二治其因也語其相應則心得善法之力煩惱何由得生語其絶緣也獨處則常貴坐禪遠離則棄諸情欲梵天菩薩有四法善入諸大衆何等為四一者求法不求勝二者恭敬心無憍慢三者唯求法利不自顯現四者教人善法不求名利是為四注不求勝則諍論絶下學乃能上達豈憍慢得預也顯現則內實實則法利無所受矣求名利則好惡生焉好惡生則縱使善法教人而不信矣梵天菩薩有四法善開法施何等為四一者守護于法二者自益智慧亦益他人三者行善人法四者示人垢淨是為四注法即大乘一心也此心絶待離人我等相良由無始妄習所礙故假護耳古云如雞抱卵書云如臨深淵如履薄氷又云戒謹恐懼皆言護惜之意也既能守護此心非惟自利亦能益他自既無善欲化他善無有是處所言垢淨者著五欲是垢離五欲是淨著我自垢不著我是淨分別是垢無分別是淨乃至有所得是垢無所得是淨等梵天菩薩有四法得先因力不失善根何等為四一者見他人闕不以為過二者于瞋怒人常修慈心三者常説諸法因緣四者常念菩提是為四注自警策也説惡因緣則以之為戒説善因緣以之為法也念覺心則生生不昧先因力也生生不昧則善根安有失焉梵天菩薩有四法不由他教而能自行六波羅蜜何等為四一者以施導人二者不説他人毀禁之罪三者善知攝法教化衆生四者解達深法是為四注先施己所有然後人伏其化如善導大師用錢勸念佛等説他人罪則以罪自歸豈自度之道故不許説也非一向不許説也若彼犯禁之人來菩薩所求懇悔過須依攝法或準律定過令生慚愧或直指實相知罪性空為化衆生亦可得説大乘六度非二乘所知故云深法若能解達則不由他教而自行矣梵天菩薩有四法能轉捨禪定還生欲界何等為四一者其心柔軟二者得諸善根力三者不捨一切衆生四者善修智慧方便之力是為四注小乘厭粗趣妙故伏亂心而入禪定大乘得心柔軟則粗妙等觀禪欲無二不得善根力則於禪定耽著而不捨安能還生欲界哉欲得善根惟衆生是所緣故不捨衆生而生欲界須善智慧方便淨名云有慧方便解無慧方便縛有方便慧解無方便慧縛梵天菩薩有四法於諸佛法得不退轉何等為四一者受無量生死二者供養無量諸佛三者修行無量慈心四者信解無量佛慧是為四注凡夫迷生死而成退失二乘怖生死而不成增進菩薩受無量生死而不倦于佛法不成退矣供無量佛則善根深厚慈心廣被則無可退之緣慈心無量故能受無量生死供佛無量故能解佛慧無量梵天菩薩有四法不斷佛種何等為四一者不退本願二者言必施行三者大欲精進四者深心行於佛道注雖起精進若不與佛道相應非精進矣蓋二乘外道皆稱精進故是為菩薩有此四法不斷佛種説是諸四法時二萬二千天子及人皆發阿耨多羅三藐三菩提心五千人得無生法忍十方諸來菩薩供養於佛所散天華周遍三千大千世界積至于膝菩薩正問品第三注此品之來由世尊稱美梵天能正問菩薩中為最第一故梵天興二十一問世尊逐一欵答副其來意也而網明詰其所以未審何者是正問耶若能問為正問則著我人若不能問為正問則墮黠慧離此二者何者即是故此品標為正問其有來矣爾時網明菩薩問思益梵天言佛説汝于正問菩薩中為最第一何謂菩薩所問為正問耶梵天言網明若菩薩以彼我問名為邪問注有我能問有彼所答是謂邪問分別法問名為邪問注于法本無能所妄興分別不了妄興欲分別法故為邪問若無彼我問名為正問不分別法問名為正問注若不分別法則彼我兩忘內無能問之心外無所問之法前無能答之主三處無著中間安然不落能所是謂正問此為總彰下文所開無非釋此不應分別法問不應著彼我之問也又網明以生故問名為邪問以滅故問名為邪問以住故問名為邪問若不以生故問不以滅故問不以住故問名為正問注生住異滅乃世間相非第一義第一義非生住滅故若著世間相而問名為邪問若不著世間相而問始稱實際是為正問如龐居士問馬祖云不與萬法為侶者是什麼人祖云待汝一口汲盡西江水此為四相不收矣又網明若菩薩為垢故問名為邪問為淨故問名為邪問注第一義空孰垢孰淨以此而問有違實際故為邪問為生死故問名為邪問為出生死故問名為邪問為涅槃故問名為邪問注生死為能迷出生死為能修涅槃為所證既涉能所非邪而何若不為垢淨故問不為生死出生死故問不為涅槃故問名為正問注下釋成所以者何法位中無垢無淨無生死無涅槃注此直顯第一義諦無如是名相故以涅槃生死對待生起實戲論故問前文生住異滅乃五陰流動之相此中生死乃衆生終始之緣衆生在迷流浪不返佛為開示使知厭生死而求涅槃是佛所説今問既為邪説寧為正答三乘教中不壞方便説亦為正一乘教中不立方便問則成邪不壞方便則權為導引之方不立方便則指歸實際之地苟滯權則迷實豈為正問也又網明若菩薩為見故問注見道也為斷故問注斷惑也為證故問注證涅槃也為修故問注修梵行也為得故問注計有所得為果故問注計有所證名為邪問注對三乘斥也若無見注解正見也無斷注惑無性也無證注涅槃無作無修注梵行無相無得注體本具足無果注究竟不有故問名為正問注對一乘所示也又網明是善是不善故問名為邪問是世間法注即三有之法也是出世間法注四聖之法也是罪法是無罪法是有漏法注世間三有皆有漏故是無漏法注出世四聖皆無漏故是有為法注俗諦是無為法注真諦如是等二法隨有所依而問者名為邪問注舉意即差動念即乖若不見二注無量即一不見不二問注一亦不有名為正問注外道問佛不問有言不問無言世尊據座外道讚云世尊大慈開我迷雲夫不問有言則不見二不問無言則不見不二如是而問則是無問世尊據座則是無答無問無答以謂開我迷雲則外道失却一雙眼雖然若能于此了去可謂解正問矣又網明若菩薩分別佛問名為邪問注佛者覺也若著分別則不覺矣分別法注法名平等若著分別則不平等矣分別僧注僧名和合若著分別則不和合矣此揀其不應起三寶等見而問也分別衆生注正報分別佛國注依報分別諸乘問注行門名為邪問若于法不作一異問者名為正問注此揀不應于依正行門起分別問所以古人云若要相應第一莫將問來問又網明一切法正一切法邪網明言梵天何謂一切法正一切法邪注若法是正則不容邪若法是邪則不受正何以邪正同是一法而出生相返也梵天言于諸法性無心故一切法名為正注若了諸法無性則無心攀緣無心攀緣則分別斯泯故名為正可謂法住法位也若於無心法中以心分別觀者一切法名為邪注一切法本是無心不知其為無心用心分別是故成邪如雲駛月運舟行岸移等一切法離相名為正注如山以高為相水以深為相眼以見為相耳以聞為相然彼各各無心山不言我高則離高相水不言我深則離深相眼不言我見則離見相耳不言我聞則離聞相而山如是高水如是深眼如是見耳如是聞不離本位故名為正若不信解是離相是即分別諸法若分別諸法則入增上慢隨所分別皆名為邪注不解如是離相用心分別以謂山言我高水言我深眼言我見耳言我聞如此則名分別諸法成有得心入增上慢矣故凡所分別皆名為邪古云這個若是則頭上加頭這個若不是則斬頭覔活著分別而取法相故非是執離相而斷分別亦是非所以云善能分別者于第一義而不動網明言何謂為諸法正性梵天言諸法離自性離欲際是名正性注離自性則內無自體離欲際則外無用相內外既離中當絶待是謂正性網明言少有能解如是正性者梵天言是正性不一不多注所言正性者人人本具法法皆然無有能解無不能解無有能解故不多無不能解故不少網明若善男子善女人能如是知諸法正性若已知若今知若當知注如是之知即無知之知也無知安知知無分別矣是人無有法已得無有法今得無有法當得注前釋如是而知此釋如是而得知既無知為知得亦無得為得所以者何注重釋無知無得之意佛説無得無分別名為所作已辦相注無得者無得諸法得諸法正性也無分別者得如是知也若人聞是諸法正性勤行精進是名如説修行注既云無知為知無得為得則無精進名為精進無精進名為精進則為如説修行不從一地至一地注正當説時即是行當其行時即是説行説同時則即解即證故不從一地至一地矣若不從一地至一地是人不在生死不在涅槃所以者何注釋成不在之意諸佛不得生死不得涅槃注諸佛無別所證惟證生死性空即是涅槃結證無得之義生死涅槃既無二性則分別斯泯矣網明言佛不為度生死故説法耶梵天言佛所示法有度生死耶注若謂佛所説法為度生死則佛有我人衆生等相矣網明言無也梵天言以是因緣當知佛不令衆生出生死入涅槃注不為生死涅槃則説法何謂釋云但為度妄想注妄想者何釋云分別生死涅槃二相者耳此中注指正性中實無度生死至涅槃者所以者何注釋成無意諸法平等無有往來無出生死無入涅槃注法華云是法住法位世間相常住住法位則不由出生死而入涅槃矣爾時世尊讚思益梵天言善哉善哉説諸法正性應如汝所説注佛不證成則取信良難説是法時二千比丘不受諸法注得無得故漏盡注不落二邊故心得解脫注了分別故佛告梵天我不得生死不得涅槃注前文如來許可梵天未有解釋恐衆疑未解故召而告之何也夫出生死入涅槃是佛常説今云不得生死不得涅槃衆所未悟矣故釋云如來雖説生死實無有人往來生死雖説涅槃實無有人得滅度者注故佛之所説為度二者之妄想耳若有入此法門是人非生死相非滅度相注古人云不是佛不是心不是物是個什麼爾時會中五百比丘從座而起作是言我等空修梵行今實見有滅度者而言無有滅度我等何用修道求智慧為注見有滅度者不知滅其妄想而不滅自性故起疑也爾時網明菩薩白佛言世尊若有于法生見則於其人佛不出世注知見盲心真覺斯隱世尊若有決定見涅槃者是人不度生死注見有滅度則宛然生死所以者何涅槃名為除滅諸相遠離一切動念戲論注涅槃名為能滅但滅諸法戲論分別之相而諸法之性實不滅若于諸法起知見則佛不出世于諸法起滅度想則不得度生死矣世尊是諸比丘於佛正法出家而今墮于外道邪見見涅槃決定相注先定墮過之由後斥著邪之謬譬如從麻出油從酪出酥注碎麻出油譬邪見滅生死入涅槃者也從酪出酥酪不至酥而酥實從酪出譬正法不滅生死而證涅槃而涅槃實度生死世尊若人于諸法滅相中求涅槃者我説是輩皆為增上慢人注前云涅槃名滅除諸相者滅知見等相也若執此滅相求涅槃則亦不出知見世尊正行道者于法不作生不作滅無得無果注前二節起知見不可滅知見不可未審正行道者所謂邪夫正行道者于諸法不作生相不作不生相不作滅相不作不滅相無得無果遠離如是戲論分別而已網明謂梵天言是五百比丘從座起者汝當為作方便引導其心入此法門令得信解離諸邪見梵天言善男子縱使令去至恆河沙劫不能得出如此法門譬如癡人畏於虗空捨空而走在所至處不離虗空此諸比丘亦復如是雖復遠去不出空相不出無相相不出無作相注譬如邪見畏生死而欲逃者不知生死即空相等欲何逃哉又如一人求索虗空東西馳走言我欲得空我欲得空是人但説虗空名字而不得空于空中行而不見空此諸比丘亦復如是欲求涅槃行涅槃中而不得涅槃注將謂涅槃定有方所而欲求之不知自性本來寂滅不知自性本來寂滅則行于寂滅中而不知其為寂滅矣所以者何涅槃者但有名字猶如虗空但有名字不可得取涅槃亦復如是但有名字而不可得爾時五百比丘聞説是法不受諸法注所謂遠離戲論也漏盡注不落二邊心得解脫注結使斷除也得阿羅漢道注云無學也作是言世尊若人於諸法畢竟滅相中求涅槃者則於其人佛不出世注起見故不是滅見亦是非故前云于法生見則佛不出世今云滅相中求亦不出世也世尊我等今者非凡夫非學非無學不在生死不在涅槃所以者何佛出世故名為遠離一切動念戲論注所言佛者即是自心古云不了法惟心起種種分別所謂聖凡生死涅槃也達法惟心已分別即不生所謂遠離動念戲論也由遠離分別故自心了然明現故云佛出世若著知見則真心隱沒故云佛不出世也爾時長老舍利弗謂諸比丘汝今得正智為己利耶五百比丘言長老舍利弗我等今者得諸煩惱不可作而作注所謂得正智者不為得利但知于煩惱不可作而作起利他之妙用也舍利弗言何故説此注舍利弗智慧第一今不知比丘所答則正性門中智有所不及矣諸比丘言知諸煩惱實相故言得諸煩惱注不知煩惱實相則為煩惱所轉知實相則能用諸煩惱故言得涅槃是無作性我等已證故説不可作而作注涅槃體是無作本來如是故言證不言得煩惱依體出生非是本有故言得不言證既依體出生則知無性故不可作而作也舍利弗言善哉善哉汝等今者住於福田能消供養注身子讚比丘得不可作而作幻興妙用利濟群有為人間之福田能消供養矣諸比丘言大師世尊尚不能消諸供養何況我等舍利弗言何故説此諸比丘言世尊知見法性性常淨故注性常淨故者以世尊知見法性入正性故遠離虗妄分別彼虗妄分別則于諸法中有福田非福田能消供養不能消供養虗妄既離則于諸法中無利無功德無利則不為福田非不福田無功德則不消供養非不消供養故淨名云其有施者無大福無小福不為損不為益於是思益梵天白佛言世尊誰應受供養佛告梵天不為世法之所牽者注不為世法所牽者則無受無受故應受供養者也世尊誰能消供養佛言于法無所取者注無所取者則內不取心外不取境內外既忘則無有消無有不消矣世尊誰為世間福田佛言不壞菩提性者注不壞菩提性則常以覺性利人不由小道故為福田世尊誰為衆生善知識佛言於一切衆生不捨慈心者注以慈待物人所仰化世尊誰知報佛恩佛言不斷佛種者注護念自心使不間斷知報恩也世尊誰能供養佛佛言能通達無生際者注無生之法是佛出世本懷能通達此是真供養四事莫預也世尊誰能親近於佛佛言乃至失命因緣不毀禁者注失命不毀禁則遠離魔外常親近佛也世尊誰能恭敬於佛佛言善覆六根者注覆六根則心不放逸心不放逸則常想恭敬矣世尊誰名財富佛言成就七財者注七功德才謂信進戒慚愧聞捨定慧世間財寶有而不實命盡隨盡出世法財生劫無窮乃名財富世尊誰名知足佛言得出世間智慧者注世間智慧迷于有為故貪取無厭出世之慧則了達法空無一所取乃名知足世尊誰為遠離佛言於三界中無所願者注無所願則攀緣心絶攀緣心絶則飄然長別矣世尊誰為具足佛言能斷一切諸結使者注結為六結眼與色結等使謂十使貪嗔癡慢疑等結使斷則所作已辦故名具足世尊誰為樂人佛言無貪著者注貪著之樂其樂有壞無貪之樂其樂無敗世尊誰無貪著佛言知見五陰者注此中重伸前問者恐于六塵境上取捨故也而佛之所答令人照破五陰妄心妄心若破則于外六塵無所貪著世尊誰度欲河佛言能捨六入者注六根為六塵所入故云六入根塵相結故流浪欲河若根塵並捨則欲河斯度世尊誰住彼岸佛言能知諸道平等者注諸道平等則非彼非此非彼非此則亦無度不度想此中生起之緣不無次第由五百比丘得諸法正性身子以為住于福田能消供養而諸比丘以明其意然正信之門非一途可盡故梵天躡其蹤而問者廣其意也前梵天斥云五百比丘于佛正法出家云何著此外道邪見夫出家有三一曰世俗家二曰三界家三曰無明家前云于佛正法出家者出世俗家此中比丘得諸法正性者出三界家也故云得阿羅漢下文菩薩六度四無量心等出無明家也因達正性則出三界出三界則應受供養應受則能消能消則為世福田為世福田則為衆生善知識為善知識則能知報恩知報恩則知所供養知所供養則知所親近知所親近則知所恭敬等可以例推之矣世尊何謂菩薩能為施主佛言菩薩能教化衆生一切智心注二施之中法施為上以一切智心化衆生施莫大焉世尊何謂菩薩能奉禁戒佛言常能不捨菩提之心注小乘以律儀無犯大乘以道共自持世尊何謂菩薩能行忍辱佛言見心相念念滅注見心滅相則外絶待緣外絶待緣則非忍不忍世尊何謂菩薩能行精進佛言求心不得注精進懈怠皆由是心所成求心不得則非精進非不精進矣世尊何謂菩薩能行禪定佛言除身心粗相注小乘作定故耽著不捨大乘性定無定無不定但除粗相矣世尊何謂菩薩能行智慧佛言於一切法無有戲論注凡夫無慧于諸法作有無二見論是則戲論若于法不作二見是行智慧世尊何謂菩薩能行慈心佛言不生衆生想世尊何謂菩薩能行悲心佛言不生法想注慈能與樂悲能拔苦生衆生想不能等與如來之樂生法非法想則不思拔衆生之苦世尊何謂菩薩能行喜心佛言不生我想注若生我想見人善則疾見不善則嗔不生我想則見人非法受苦思所以拔之見人德彥賢聖思所以讚之矣世尊何謂菩薩能行捨心佛言不生彼我想世尊何謂菩薩安住于信佛言信解心淨無濁法注凡夫信于有為即名染汙菩薩圓信自心無濁則遠離戲論而安住淨信矣世尊何謂菩薩安住于空佛言不著一切語言注前由達法正性而網明問能受供養以及六度四心之後特問住空何也蓋由一切差別名相皆自心之影耳故世尊答曰不著語言不著語言則一切皆空矣世尊何謂菩薩名為有慚佛言知見內法注知法內具則慚于昔迷世尊何謂菩薩名為有愧佛言捨于外法注捨外法則前後際斷前後際斷則愧昔攀緣世尊何謂名為菩薩遍行佛言能淨身口意業注一切業皆因三業之所生起三業若淨是菩薩遍行若不淨是衆生遍行偈文廣釋爾時世尊而説偈言若身淨無惡口淨常實語心淨常行慈是菩薩遍行注身無惡則該殺盜淫口以實語等四治口四過謂實語治妄言等意業有三偏舉行慈慈能治恚以菩薩惟嗔為害茲甚故曰一念嗔心起百萬障門開故行慈則餘亦備矣此偈通舉十善十惡文互具也行慈無貪著觀不淨無恚行捨而不癡是菩薩遍行注上文總舉十業此中別舉意三以意為能攝故行慈有二一者無緣慈二者愛見慈若行慈有貪著則落愛見非無緣矣觀身不淨不即厭恚若起厭恚則墮二乘行捨不求果報若求果報則成貪著貪著則成癡愛若于三業無貪無恚不癡是名菩薩遍行非二乘可比若在空聚野及與處大衆威儀終不轉是菩薩遍行注由意清淨則獨居不為靜處衆不為閙不為前塵所轉無可不可知法名為佛知離名為法知無名為僧是菩薩遍行注由獲動靜不二則得法正性離諸分別達無相心一體三寶于茲見矣知多欲所行知恚癡所行善知轉此行是菩薩遍行注既悟三寶本乎一心則貪嗔癡與解脫曾無二念不著不厭妙得其趍故曰善知不依止欲界不住色無色行如是禪定是菩薩遍行注既三毒三德妙得其轉則不居三界行乎禪定也信解諸法空及無相無作而不盡諸漏是菩薩遍行注行如是禪定則不著不厭不著故無相無作不厭故不盡諸漏善知聲聞乘及辟支佛乘通達于佛乘是菩薩遍行注聲聞支佛乘即達諸法空無相無作而取漏盡者也佛乘則雖知空無相無作不盡漏者也明解于諸法不疑道非道憎愛心無異是菩薩遍行注道即三乘非道即六凡明解法性平等于道非道不起憎愛又貪等為非道故於過去未來及與現在世一切無分別是菩薩遍行注前則道非道平等此則三世平等一切無分別生死涅槃無不平等矣爾時思益梵天白佛言世尊何謂菩薩過世間法通達世間法通達世間法已度衆生於世間法行於世間不壞世間注世間有三種一曰器世間二曰衆生世間三曰智正覺世間過世間者謂超過器世間衆生世間入智正覺世間也通達世間者合舉三世間也度衆生于世間法者雖知世間法無相無作現同事攝還以此法度衆生也行于世間不壞世間者由知世間如幻妙運中道不染不壞其猶日月行空不同世間照臨世間不礙世間也爾時世尊以偈答曰説五陰是世世間所依止依止於五陰不脫世間法注五陰者色受想行識也陰以蓋覆為義能覆真如於是內結根身外成器界轉展相依不能解脫以五陰為能造世界為所造能所相成有世間法菩薩有智慧知世間實相所謂五陰如世間法不染注衆生為無明所障不悟五陰實相故于世間不成解脫菩薩有大智慧善知如相故處之不染所謂超過世間也利衰及毀譽稱譏與苦樂如此之八法常牽于世間大智慧菩薩散滅世間法見世壞敗相處之而不動得利心不高失利心不下其心堅不動譬如須彌山利衰及毀譽稱譏與苦樂於此世八法其心常平等注利等八法又名八風衆生不了虗妄常為所牽擾動心海菩薩以智慧觀照妙得實相處之不動猶若須彌知世間虗妄皆從顛倒起如是之人等不行世間道注釋上何以菩薩處之不動之意以菩薩知世間虗妄由顛倒而起故不動也此答通達世間法也世間所有道菩薩皆識知故能於世間度衆生苦惱注此答通達世間法已度衆生于世間法也雖行於世間如蓮華不染亦不壞世間通達法性故注此答行於世間不壞世間也世間行世間不知是世間注世間凡夫不知虗妄堅執不捨故恆處生死菩薩行世間明了世間相世間虗空相虗空亦無相菩薩知如是不染於世間注二乘不了世間虗妄由顛倒而起執為實有用心破除若執實有虗妄顛倒則是著相菩薩善知世間無相之相同于虗空非實非虗如是而已如所知世間隨知而演説注前云度衆生苦惱未審以何為度菩薩以無度為度隨其所知為人演説令彼自度非他能度也知世間性故亦不壞世間五陰無自性是即世間性注世間無性之性即如五陰無性知是無性故處之不壞重釋前意若人不知是常住於世間若見知五陰無生亦無滅是人行世間而不依世間凡夫不知法于世起諍訟是實是不實住是二相中我常不與世起於諍訟事世間之實相悉以了知故諸佛所説法皆悉無諍訟知世平等故非實非虗妄注此頌諸法正性門實相如是非實非虗非特我説諸佛亦然若住二相則起諍訟下文斥非也若佛法決定有實有虗妄是即為貪著與外道無異而令實義中無實無虗妄是故我常説出世法無二若人知世間如是之實性於實於虗妄不取此惡見如是知世間清淨如虗空是大名稱人照世間如日若人見世間如我之所見如斯之人等能見十方佛注此頌能見世間實相如佛所見則能見十方諸佛法身也諸法從緣生自無有定性若知此因緣則達法實相若知法實相是則知空相若能知空相則為見導師注此釋前偈能知實相則為見佛之意諸法皆因緣生因緣生故無定性無定之性即是實相實相者即是空相能知空相則為見佛故中觀偈曰因緣所生法我説即是空亦名是假名亦名中道義所謂無定之性也若有人得聞如是世間相雖行於世間而不住世間注前云能知能見乃自證之境故能如是此則從人所聞亦獲實相也依止諸見人不能及此事注此揀外道依正邪見起六十二見于實相門中不能及也云何行世間而不住世間若佛滅度後有樂是法者佛則於其人常現於法身若人解達此則守護我法亦為供養我亦是世導師注信是實相則見法身解此則為供養守護自利之功也為世導師利他之行也若人須臾聞世間性如此是人終不為惡魔所得便注此頌以劣顯勝之意須臾之聞時之極促尚乃護益何況見聞信解長時修習而不得妙利者乎若能達此義則為大智慧法財之施主亦是具禁戒若知世如此忍辱力勇健具足諸禪定通達于智慧注能達此實相是名具足六波羅蜜所在聞是法其方則有佛如是諸菩薩不久坐道場若有深愛樂如是世間性則能降衆魔疾得無上道注自云何行世間總彰信解行證之意文顯不釋也網明初問何為菩薩正問次問何為諸法正性梵天以無彼我分別為正問離虗妄分別為正性皎若日星宜乎不言而喻矣五百比丘執動疑生幾將退座網明為請方便梵天乃云直饒退至恆河沙劫不能得出此之法門連引逃空索空二喻一衆知歸可謂梵天不與方便而方便已竟比丘無所信解而信解了然身子起己利之贊智所不知比丘答煩惱本空業非有實觀其賓主問答雲興瓶潟其無畏辨孰與之比何以及至誰應受供養等三十問似有不知一一問佛豈梵天有能不能乎當有指哉答從聞思修入三摩地是諸佛法施之式諸菩薩入道之門由問而答由答而聞由聞而解故比丘從梵天得悟聞思信解于茲見矣是二者皆因網明發起者同依根本智也下文應受供養等三十問以至五陰世界等乃修證之門非思慧所及若問若答皆尊梵天者信解行證同出方便之智也蓋此頓教大乘一心絶待無問無答無證無修非方便之智曷由發起故以象示之耳四諦品第四注由前品見知實相則為見佛處世不動猶若須彌照世如日為人導師具足六度降伏魔冤如是功德以何為趣蓋趣聖諦也前則實相以正性為宗此則實相以聖諦為趣實相以無相為相聖諦以無諦為諦云何有四四者乃世間之相了此四相體空無性即是聖諦故于正問之後繼以聖諦知其為趣也佛復告思益梵天如來出過世間亦説世間苦世間集世間滅世間滅道注前梵天問何謂菩薩過世間法度衆生于世間法中而如來意曰非特菩薩而我亦超過世間法亦説世間法度衆生于世間法也五陰名為世間苦注五陰以世間為所造世間以五陰為能造能所相依展轉不脫是世間苦相貪著五陰名為世間集注由過去五陰集因招至現前世間苦果不了虗妄重搆業因招至來果是世間集五陰盡名為世間滅注現前色身臨終敗壞是五陰盡相以後陰無知故不了無生無滅是世間滅以無二法求五陰名為世間滅道注此中有二若以無二法求五陰實相所為五陰如故世間亦如是出世間道諦若以無二法中執有五陰可斷是世間滅道前解義現下文後解正此中之意又梵天所言五陰但有言説注實無體性可得不了無性可得於中取相分別生見而説是名世間苦不捨是見是名世間集是見自相是名世間滅注起見分別觀察五陰自相念念不住是名為滅隨以何道不取是見是名世間滅道注隨在何道不取分別之見名為滅道以不悟分別亦無性是故不名諦前則四諦出于五陰此則四諦具乎一念五陰通于三世四諦分于果因皆世間相也梵天以是因緣故我為外道仙人説言仙人於汝身中即説世間苦世間集世間滅世間滅道注前則即念而示此則即身而示也何為身中四諦生老病等八苦總名苦以求不得愛別離五陰熾盛為集八苦遷流為滅遠離五陰八苦是滅道又四大聚即是世間苦起殺盜淫是世間集四大敗壞是世間滅厭苦求樂是世間滅道身心二途是衆生世間之四諦如來委曲開示獨不説器世間四諦何也蓋衆生世間器世間二而不二若以正攝依説衆生世間則攝器世間故不説又四諦乃衆生妄心取相分別故立四諦器世間是無情無分別世相如故無四諦可説雖佛不説相以具足五濁同聚是世間苦鬪諍堅固是世間集年月遷流是世間滅原始反終是世間滅道下文聖諦即是智正覺世間也爾時思益梵天白佛言世尊所説四聖諦何等是真聖諦梵天苦不名為聖諦苦集不名為聖諦苦滅不名為聖諦苦滅道不名為聖諦注四諦皆名苦者世間相也下釋成所以者何若苦是聖諦者一切牛驢畜生等皆應有苦聖諦若苦集是聖諦者一切在所生處衆生皆應有集聖諦所以者何以集故生諸趣中若苦滅是聖諦者觀滅者説斷滅者皆應有滅聖諦注觀滅者自修之人説斷滅者即是與人説法也楞嚴經迦旃延毗羅視子咸言此身死後斷滅名為涅槃又如此方性理中説身死之後形骸朽滅精神飄散縱有銼燒之作略無所施皆説斷滅者若苦滅道是聖諦者緣一切有為道者皆應有道聖諦注有為道者即是世間外道神仙乃至諸子百藝各謂有道出世二乘以及事度菩薩未盡無為同名有為也梵天以是因緣故當知聖諦非苦非集非滅非道聖諦者知苦無生是名苦聖諦注釋上非苦等何謂非苦以苦無生苦若有生為生心耶為生境耶若生于境苦是境苦于我何有若生于心為與心一耶異耶若與心一則不知為苦以心不自知故若與心異則還同前境如是推求畢竟無生是謂聖諦知集無和合是名集聖諦注何謂非集由過去集因招至現在苦果由現前集因招至未來苦果然過去不至現在現在不至未來何以故過去已滅未來未至現在不住三際推求無集可得集尚無有何名和合無和合故是名聖諦於畢竟滅法中知無生無滅是名滅聖諦注何謂非生非滅以色等五陰念念不住外道計為斷滅二乘用心降伏執為畢竟滅二者皆無聖諦大乘當其滅處不礙其生了悟無生無得滅故名為滅聖諦於一切法平等以不二法得道是名道聖諦注平等者不得生死不得涅槃遠離二邊五陰如故世間亦如如如無得無得故得道聖諦梵天真聖諦者無有虗妄注上文四種聖諦了達苦等無性是名聖諦若謂聖諦有四即同虗妄非真聖諦真聖諦者非特無苦等四相乃至我人壽者及一切虗妄悉皆無有也虗妄者所謂著我著衆生著人著壽者著養育者注外道謂我從梵天士夫等養育也如此方計性從天所賦等著有著無著生著滅著生死著涅槃注此轉釋成上文若著如是名相非真聖諦矣蓋斥其常見也梵天若行者言我知見苦是虗妄我斷集是虗妄我滅證是虗妄我修道是虗妄所以者何是人遺失佛所護念是故説為虗妄注此斥其斷見也蓋有為常見無為斷見亦有亦無是增益見非有非無是戲論見如此四見生起六十二邪見少有不盡則遺失佛種不為所護念矣何等是佛所護念注既斥其邪當顯其正謂不憶念一切諸法是名佛所護念注所為四句百非皆不之憶六祖云不思善不思惡只什麼去自然心入無生湛然常寂若行者住是念中則不住一切相若不住一切相則住實際若住實際是名不住心若不住心是人名為非實語非虗妄語者注外遣一切相內遣能住心心相既泯則非實非虗妄梵天是故當知若非實非虗妄者是名聖諦梵天實者終不作不實注不作不實故非虗實不自立故非實若有佛若無佛法性常住注轉釋非實非虗之意若有若無是世間相而法性常住未嘗有無矣所謂生死性涅槃性是性常實所以者何非離生死得涅槃名為聖諦注上文雙遣心相則云非實非虗此中雙遣生死涅槃則云自性常實所謂直指人心不立文字于此見矣若人證如是四諦是名世間實語者注如是四諦非證非不證所謂口欲談而辭喪意欲緣而慮忘但可如是而已梵天當來有比丘不修身不修戒不修心不修慧是人説生相是苦諦衆緣和合是集諦滅法是滅諦以二法求相是道諦佛言我説此愚人是外道徒黨我非彼人師彼非我弟子是人墮于邪道破失法故説言有諦注佛欲令末世比丘于身修戒于心修慧故説苦等四相使知不實而比丘非惟不修戒不修慧而復説如此豈為佛之弟子真外道徒黨耳梵天且觀我坐道場時不得一法是實是虗妄若我不得法是法寧可於衆中有言説有論議有教化耶注前斥比丘所計為非不苟然耳我實不得一法而坐道場也世尊大似抱贓自首梵天言不也世尊梵天以諸法無所得故諸法離自性故我菩提是無貪愛相注世尊於仙苑之中三轉四諦法輪而陳那等始初解其餘未悟于四諦法不了無生作有無戲論等見故世尊即諸四諦而示實相于諸法正性之後繼談四聖諦法雷揮電掃名相不存可謂正直捨方便者也問天台四種四諦此當第幾答一心頓教名相不收尚非其一何況有四詮指之間不無標的初云五陰名為世間等乃生滅四諦兼于無量後云知若無生等乃無生四諦兼于無作末云真聖諦者出過名言雙遣虗實乃至無有言説論議教有所不收如來自償口債天台安能擬哉歎功德品第五注由聞如來不得一法而坐道場則知無功德為功德讚莫能盡功德以無功德為功德則讚歎以無讚歎為讚歎一切會歸于自心矣爾時思益梵天白佛言世尊若如來於法無所得者有何利益説如來得菩提名為佛注梵天恐衆中不解無得而得亦是表詮故此難問佛言梵天於汝意云何我所説法若有為若無為是法為實為虗妄耶梵天言是法虗妄非實注凡夫著有為佛説無為以破其執二乘著無為佛説漚和以起其定有無既是對機所説于我何有故梵天知其為虗妄非實矣於汝意云何若法虗妄非實是法為有為無注此有四句分別是法謂有無為有有為邪是法謂無有為無無為邪梵天言世尊若法虗妄是法不應説有不應説無於汝意云何若法非有非無是法有得者不梵天言無有得者梵天如來坐道場時惟得虗妄顛倒所起煩惱畢竟空性注前品云觀我坐道場時不得一法是實是虗妄以至無言説論議而梵夫難云若不得一法云何而得菩提名為佛耶世尊質其辭而告云我坐道場不得諸法但得諸法空性前云涅槃虗空特有名字而無實性以無所得故得以無所知故知注無所得故得者了諸法空得自心故無所知故知者煩惱不實知自性常妙故所以者何我所得法不可見注如眼不能自見其眼不可聞注耳不能自聞不可覺注心不自覺不可識注識不自識四者乃內證不可得之意也不可取注如水中月鏡中像不可著注如陸地焰夢中境不可説注我不得而説不可難注汝不得而難此四者外證其不可得也出過一切法相無語無説無有文字無言説道注內外既不可得則知是法出過一切法相無言無説證前無言説也無文字證前無論議也無言説道者證前無教化也梵天此法如是猶如虗空汝欲如是法中得利益耶梵天言不也注如是之辭世尊極力道之不盡引喻虗空為證未得一半若要完全公案須向自己體取始得梵天問既不得一法有何利益而得菩提世尊先答其無所得而得次難其無所得而得不應于中求利益也世尊諸佛如來甚為希有成就未曾有法深入大慈大悲得如是寂滅相法而以文字言説教人令得注實際之中無有一法雖無一法而不礙言説文字教人寂滅者不生不滅也謂不滅故而教人令得不生故而實無一法世尊其有聞是法能信解者當知是人不從小功德來世尊是法一切世間之所難信所以者何世間貪著實而是法無實無虗妄世間貪著法而是法無法無非法世間貪著涅槃而是法無生死無涅槃世間貪著善法而是法無善無非善世間貪著樂而是法無苦無樂世間貪著佛出世而是法無佛出世亦無涅槃雖有説法而是法非可説相注前正問品中若于法生見則佛不出世於畢竟滅法中求涅槃則佛不出世又云佛出世故名為遠離戲論而恐衆中實謂有佛出世及梵天呈解并皆掃拂矣疑云若無佛出世何以現有説法者釋云他説個無説者若謂有可説則成戲論雖讚説僧而僧即無為注無為則讚毀平等是故此法一切世間之所難信注此彰絶待一心結成難信也以絶待故非虗非實非生死非涅槃非善非惡非苦非樂萬法俱非真心獨朗皮膚脫落唯存真實是謂難信譬如水中出火火中出水難可得信如是煩惱中有菩提菩提中有煩惱是亦難信注煩惱中有菩提則不壞法性菩提中有煩惱則不斷性惡煩惱菩提若以相觀則如水火之不相容若以性觀則妙涵而不奪三乘人多以執相迷性則菩提煩惱勢相矛盾皆欲滅煩惱而取菩提一乘教中煩惱菩提彼此妙容曾無二至是謂難信所以者何如來得是虗妄煩惱之性亦無法不得注上句彰真空之性下句顯妙有之法真空故煩惱本如妙有故無法不得有所説法亦無有形注由無法不得故不礙有所説雖有所説無定體可得雖有所知亦無分別注知契真如遠離戲論故無分別雖證涅槃亦無滅者注涅槃名為滅度度煩惱生死故而此圓妙自心證法如是無生死可滅證涅槃也世尊若有善男子善女人能信解如是法義者當知是人得脫諸見注如是法義遠離二邊所謂非實非虗等實即是有虗即是無有無二見疊成六十二見故曰諸見既離二見則諸見斯脫矣當知是人已親近無量諸佛當知是人已供養無量諸佛注脫諸見則心契實相契實相故是名親近是名供養當知是人為善知識所護注心契實相同道者所親當知是人志意曠大當知是人善根深厚注根大則佛地自許根厚則大法自荷當知是人守護諸佛法藏當知是人能善思量起於善業注擔荷大法則守護法藏自許佛地則起真如善果當知是人種姓尊貴生如來家注一念信解實相便名佛子不同三乘漸次熏修猶誕生王子尊貴天然不同臣子久學乃成故曰菩薩一念發心便登正覺當知是人能行大捨捨諸煩惱當知是人得持戒力非煩惱力注小乘持作止之戒多生煩惱大乘心契實相便名道共當知是人得忍辱力非嗔恚力注心境相對則嗔恚斯生心若絶待則無忍可忍當知是人得精進力無有疲懈當知是人得禪定力滅諸惡心注小乘心存有得故耽著不捨是謂惡心大乘存心平等絶無耽著當知是人得智慧力離惡邪見注外道中無智慧違背實相著諸邪見若人能信是法則邪見離矣當知是人一切惡魔不能得便當知是人一切怨賊所不能破注實相之中兩忘損益故惡魔怨賊皆無能為當知是人不誑世間當知是人是真語者善説法相故當知是人是實語者説第一義故當知是人善為諸佛之所護念當知是人柔和軟善同止安樂注由信解是法故生如來家行佛所行故具六波羅蜜具六波羅蜜不為惡境所動不為惡境所動則其有所説不誑不妄不妄故其所説法相也真不誑故其所説第一義諦也實惟其真實故為諸佛護念與衆同止具足六和矣當知是人名為大富有聖財故當知是人常能知足行聖種故注聖財聖種皆依自心之所出生能信自心則聖種聖財于斯備矣當知是人易滿易養離貪著故注易滿菩提易養法身離貪故易滿離著故易養當知是人得安隱心到彼岸故注上皆自信自行下乃利人之事當知是人度未度者當知是人解未解者當知是人安未安者當知是人滅未滅者注此中四句雙舉自他自則煩惱難度而能度他則未度煩惱而令度準此可知于自則成前自信自解之意于他則下所謂示人正道之意也當知是人能示正道當知是人能説解脫當知是人為大醫王善知諸藥當知是人猶如良藥善療衆病注正道解脫乃所説之法醫王良藥乃所逗之機藥喻實相善療差別之病當知是人智慧勇健當知是人為有大力堅固究竟當知是人有精進力不隨他語注智慧勇健則無疑不決堅固究竟則無惑不破自有主張則不隨他教三者由信解實相故能擔荷自他是名勇健是名堅固是名精進矣當知是人為如師子無所怖畏當知是人為如象王其心調柔當知是人為如老象其心隨順當知是人為如牛王能導大衆注無畏則善得其體調柔則善得其用隨順則善得其方便三者既備則善導大衆猶如牛王矣當知是人為大勇健能破魔怨注前則魔怨不干此則能伏魔怨文互見也當知是人為大丈夫處衆無畏當知是人無所忌難得無畏法故當知是人無所畏難説真諦法故注無忌則不嫉無畏則不怯釋成丈夫無畏之義當知是人具清白法如月盛滿當知是人智慧光照猶如日月當知是人除諸暗冥猶如執炬注如月盛滿則逈絶塵翳逈絶塵翳則智慧光明猶如日月日乃照晝月乃照夜炬乃照日月所不及處三者相繼用顯實相慧光無所不矚矣當知是人樂行捨心離諸憎愛注心信實相則冤親平等憎愛斯遠矣當知是人載育衆生猶如地當知是人洗諸塵垢猶如水當知是人燒諸動念猶如火當知是人於法無障猶如風注衆生惟實相為能淨動念惟實相為能盡障礙惟實相為能通能信是法則地水火風何所不該矣當知是人其心不動如須彌當知是人其心堅固如金剛山當知是人一切外道競勝論者所不能動注外道議論不出有無諸見信解是法則諸見遠離故不能動當知是人一切聲聞辟支佛所不能測注聲聞辟支雖證偏空未窺實際故不能也當知是人多饒法寶猶如大海當知是人煩惱不現如波陀羅當知是人求法無厭當知是人以智慧知足當知是人能轉法輪如轉輪王注輪王轉十善之輪信解行人轉實相之輪當知是人身色殊妙如天帝釋當知是人心得自在如梵天王當知是人説法音聲猶如雷震當知是人降法甘露猶如時雨當知是人能增長無漏根力覺分注根即五根力即五力七覺分八聖道總名三十七道品皆由説法所被之益聲如雷震驚動群機使之覺悟應機潤澤猶如時雨而增長道芽也當知是人已度生死汙泥當知是人入佛智慧當知是人近佛菩提當知是人能多學問無與等者當知是人無有量已過量當知是人智慧辨才無有障礙當知是人憶念堅固得陀羅尼當知是人知諸衆生深心所行當知是人得智慧力正觀諸法解達義趣注此上由度生死則近佛菩提近佛菩提則其學問出于三乘過于數量越數量故慧辨無礙獲得總持得總持故能知衆生所行正觀故所見不謬解達故示無差別此中自利利他莫不皆實相之功也當知是人勤行精進利安世間當知是人超出於世當知是人不可汙染猶如蓮華當知是人不為世法所覆注欲利安世間者先當自利先自利故超出于世不為世染猶如蓮華亦不為世法所覆以實相之理不如世間而行于世間不壞世間也當知是人利根者所愛當知是人多聞者所敬當知是人智者所念當知是人天人供養當知是人為坐禪者所禮當知是人善人所貴當知是人聲聞辟支佛之所貪慕注信解如是法義為衆所尊其誰能無仰學乎當知是人不貪小行當知是人不覆藏罪不顯功德注實相法義尚非大乘所收誰貪小行罪福體是無生何藏何顯當知是人威儀備具生他淨心當知是人身色端正見者悅樂當知是人有大威德衆所宗仰當知是人以三十二相莊嚴其身注前是説法音聲以至聲聞貪慕贊其口業功德是不貪小行至此贊其身業功德也當知是人能繼佛種當知是人能護法寶當知是人能供養僧當知是人諸佛所見當知是人為得法眼當知是人以佛智慧而得受記當知是人具足三忍注三忍即苦行忍生忍第一義忍亦名法忍義出法華當知是人安住道場當知是人破壞魔軍當知是人得一切種智當知是人轉于法輪當知是人作無量佛事注此上贊文前後錯出不能根其次第大意惟一實相耳毋以辭害意而出別解也若人信解如是法義不驚疑怖畏者得如是功德是人於諸佛阿耨多羅三藐三菩提甚深難解難知難信難入而能信受讀誦通利奉持為人廣説如説修行亦教他人如説修行如是之人我以一劫若減一劫説其功德猶不能盡注此品本四聖諦品分出而似有差上云我菩提是無貪愛相梵天躡其迹而問曰既不得一法坐于道場未審有何利益説得菩提如是番番徵詰以及汝欲于如是法中得利益耶應在聖諦品中血脈連接下文世尊諸佛如來甚為希有乃屬嘆功德品于義斯穩

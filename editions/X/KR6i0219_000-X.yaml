body:
  text: 思益梵天所問經簡註序夫真心本淨法性原虗由不守自性而變現隨緣迷逐無明而罔知返本是以大覺世尊嗟眾生之沉滯憫六道之循環於是起同體之悲設無為之化雖則湛湛忘言而圓音落落空空無物而妙相重重如月印寒空而百川並赴春回大地而萬化均資本無來往寧越後先良由羣機不等致使巧說多方或圓彰法界之宗或漸開事理之轍或破有譚空或呵空讚妙無非方便一時曾無定說若夫黜意識絕言思泯聖凡超階級直指人心頓同佛體其惟思益梵天所問經歟此經四卷二十四品以人法兼舉為名根本智光為體諸法正性為宗破疑蕩執為用大乘生酥為教相互興問答始末一如大意以無說為說無聞為聞無發心之為發心無證果是名證果遠離虗妄逈出有無雷揮電掃而纖跡不存事極理玄而真心獨朗然則楞伽亦名頓教何以偏讚此經蓋由彼帶相宗此原性理雖云即相明心何似了心見道彼因達摩付囑舉世弘持此為久匿藏中絕無人識所以徒知楞伽可尚安識此法最尊爾來段當末季法運將隆根熟在時知音始遇有大居士慎軒黃君秉護法心不忘付囑運慈悲念刻此流通余客京師大史陶君大開寶藏施我衣珠披閱再三粗明大旨聊為簡註不避效顰文採肇公論依長者心祈勝善欵此通途挈領提綱俟諸知識若也親契佛心不由文字洞明己事豈在言詮其或離波求水智者知狂認影迷頭愚夫亦誚不拒言不著言拈來盡是即此物非此物用處休疑心融意解予復何言識節知時君當自擇旹大明萬曆三十一年歲在癸卯季春越中顯聖寺後學沙門嗣曹洞正宗第二十七代圓澄註并敘思益梵天所問經簡註目次卷第一自序如來光明品第一四法品第二菩薩正問品第三四諦品第四歎功德品第五卷第二如來五力說法品第六如來大悲品第七幻化品第八菩薩光明品第九菩薩受記品第十薩婆若品第十一卷第三菩薩無二品第十二名字義品第十三論寂品第十四如來二事品第十五得聖道品第十六志大乘品第十七發菩提心品第十八卷第四師子吼品第十九梵行牢強精進品第二十海喻品第二十一建立法品第二十二如來神呪品第二十三囑累品第二十四思益梵天所問經簡註目次終
